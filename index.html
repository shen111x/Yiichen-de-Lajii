<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">

  <title>Yiichen de Lajii</title>

  <link rel="stylesheet" href="css/universal.css">

  <style>
    .home_body_main {
      width: 100vw;
      min-height: 100vh;
      box-sizing: border-box;
      padding: calc(var(--header_topbar--height, clamp(28px, 8vw, 35px)) + var(--gap-unit) * 6) calc(var(--gap-unit) * 3) calc(var(--gap-unit) * 3);

      background: var(--page-white);
    }

    .home_body_hero {
      width: 100%;
      height: auto;

      display: flex;
      flex-direction: column;
      align-items: center;

      gap: calc(var(--gap-unit) * 3);
    }

    .home_body_hero_videoWrapper {
      width: 100%;
      height: 70vh;
      max-width: 1080px;
      overflow: hidden;
    }

    .home_body_hero_videoWrapper video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
    }

    .home_body_hero_textWrapper {
      text-align: center;
      max-width: 525px;
      padding-top:2vh;

    
    }

    .home_body_hero_surfButton {
      width: 75px;
      height: var(--header_topbar--height, clamp(28px, 8vw, 35px));
      box-sizing: border-box;

      display: flex;
      align-items: center;
      justify-content: center;

      color: #000;
      text-decoration: none;
      border: var(--stroke--width) solid #000;
    }

    .home_body_copyrightContainer {
      margin-top: calc(var(--header_topbar--height, clamp(28px, 8vw, 35px)) * 3);
    }
  </style>
</head>

<body data-page="home">
  <header id="header_container"></header>

  <div class="home_body_main">
    <div class="home_body_hero">
      <div class="home_body_hero_videoWrapper">
        <video
          src="image/test/a.mp4"
          autoplay
          muted
          loop
          playsinline
          webkit-playsinline
          x5-playsinline
          x5-video-player-type="h5"
          x5-video-player-fullscreen="false"
          preload="auto"
        >
          <source src="image/test/a.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      </div>

      <div class="home_body_hero_textWrapper">
        <h1>" Satellite Man "
          <br>Summer 2026
        </h1>
        <p>If you hug me, I am of no value.

Shop our latest collection for those experiencing weak signal.</p>
      </div>

      <a class="home_body_hero_surfButton" href="bags/">Surf Now</a>
    </div>

    <div id="copyright_container" class="home_body_copyrightContainer"></div>
  </div>

  <script src="js/universal.js"></script>
</body>
</html>
