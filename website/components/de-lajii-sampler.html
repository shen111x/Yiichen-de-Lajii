<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@font-face{
  font-family:"ImperialScript";
  src:url("../css/f/imperial-script-regular.ttf") format("truetype");
  font-weight:400;
  font-style:normal;
}

:root{
  --base-font-size:clamp(1rem, 5vh, 1.1rem);
  --stroke-ratio:0.17;
  --piano-aspect-width:217;
  --piano-aspect-height:101;
  --dashboard-ratio:39fr;
  --keyboard-ratio:65fr;
  --stroke:2px; /* calc(var(--base-font-size) * var(--stroke-ratio)); */
  --dpr-type-scale:1;
  --button-width:13cqw;
  --reset-width:17.56cqw;
  --button-height:6.81cqw;
  --button-gap:1.95cqw;
  --dashboard-padding-x:1.56cqw;
  --dashboard-padding-y:1.56cqw;
  --button-font-size:4cqw;
  --play-font-size:4.93cqw;
  --record-font-size:3.8cqw;
  --mode-font-size:2.93cqw;
  --toggle-width:4.55cqw;
  --slider-thumb-height:calc(var(--button-height) * 0.55);
  --slider-track-width:calc((var(--button-width) * 2) + var(--reset-width) + (var(--button-gap) * 2));
  --slider-thumb-width:var(--button-width);
  --logo-letter-spacing:-0.01em;
  --logo-word-spacing:-0.06em;
  --logo-font-size:6cqw;
  --logo-y-offset:-0.2em;
  --record-red:#8b0000;
  --play-green:#0f5f2f;
}

@media (max-width: 767px) {
  :root{
    --stroke-ratio:0.14;
  }
}

html,body,
button,
input,
select,
textarea,
.piano-main{
 -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}

html,body{
  margin:0;
  width:100%;
  min-width:0;
  height:100%;
  overflow:hidden;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html,body,
button,
input,
select,
textarea{
  -webkit-text-size-adjust:none;
  text-size-adjust:none;
}

.piano-main{
  container-type:inline-size;
  display:grid;
  position:relative;
  width:100%;
  min-width:0;
  max-width:100%;
  height:auto;
  aspect-ratio:var(--piano-aspect-width) / var(--piano-aspect-height);
  border:var(--stroke) solid #000;
  box-sizing:border-box;
  grid-template-rows:var(--dashboard-ratio) var(--keyboard-ratio);
  background:#fff;
  contain:layout paint style;
  transform:translateZ(0);
}

.piano-main::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:calc(var(--stroke) * var(--bottom-stroke-compensation));
  background:#000;
  pointer-events:none;
}

.piano-dashboard{
  border-bottom:var(--stroke) solid #000;
  display:grid;
  grid-template-columns:207fr 10fr;
  min-height:0;
}

.panel-left{
  min-width:0;
  padding:0 var(--dashboard-padding-x);
  box-sizing:border-box;
  display:grid;
  grid-template-rows:minmax(0, 1fr) var(--slider-thumb-height) minmax(0, 1fr) var(--button-height) minmax(0, 1fr);
}

.panel-right{
  display:flex;
  align-items:flex-start;
  justify-content:flex-end;
  padding:var(--dashboard-padding-y) calc(var(--dashboard-padding-x) * 1.333) 0 0;
  box-sizing:border-box;
  position:relative;
  overflow:visible;
}

.logo{
  font-family:"ImperialScript", "Brush Script MT", "Brush Script Std", cursive;
  font-size:calc(var(--logo-font-size) * var(--dpr-type-scale));
  font-weight:400;
  letter-spacing:var(--logo-letter-spacing);
  word-spacing:var(--logo-word-spacing);
  white-space:nowrap;
  transform:translateY(var(--logo-y-offset));
}

.slider-row{
  grid-row:2;
  width:var(--slider-track-width);
  max-width:100%;
  height:var(--slider-thumb-height);
  display:flex;
  align-items:center;
  position:relative;
  overflow:visible;
}

.slider-row::before{
  content:"";
  position:absolute;
  left:0;
  top:50%;
  width:100%;
  height:var(--stroke);
  background:#000;
  transform:translateY(-50%);
}

input[type="range"]{
  position:absolute;
  left:0;
  width:var(--slider-track-width);
  height:var(--slider-thumb-height);
  margin:0;
  appearance:none;
  background:transparent;
}

input[type="range"]:focus{
  outline:none;
}

input[type="range"]::-webkit-slider-runnable-track{
  height:var(--stroke);
  background:transparent;
}

input[type="range"]::-webkit-slider-thumb{
  appearance:none;
  width:var(--slider-thumb-width);
  height:var(--slider-thumb-height);
  margin-top:calc((var(--stroke) - var(--slider-thumb-height)) / 2);
  background:#fff;
  border:var(--stroke) solid #000;
  border-radius:0;
}

input[type="range"]::-moz-range-track{
  height:var(--stroke);
  background:transparent;
}

input[type="range"]::-moz-range-thumb{
  width:var(--slider-thumb-width);
  height:var(--slider-thumb-height);
  background:#fff;
  border:var(--stroke) solid #000;
  border-radius:0;
}

.controls{
  grid-row:4;
  display:flex;
  align-items:center;
  gap:var(--button-gap);
}

button{
  -webkit-appearance:none;
  appearance:none;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
  width:var(--button-width);
  height:var(--button-height);
  padding:0;
  background:#fff;
  border:var(--stroke) solid #000;
  border-radius:0;
  color:#000;
  font-size:calc(var(--button-font-size) * var(--dpr-type-scale));
  line-height:1;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

button:focus{
  outline:none;
}

#record{
  color:var(--record-red);
  font-size:calc(var(--record-font-size) * var(--dpr-type-scale));
}

#play{
  color:#bbb;
  font-size:calc(var(--play-font-size) * var(--dpr-type-scale));
}

#play.ready{
  color:var(--play-green);
}

#play.playing{
  color:#000;
}

#play.playing .screen-label{
  font-size:.72em;
}

#reset{
  width:var(--reset-width);
  background:#f8f8f8;
}

#reset::before{
  content:"";
  position:absolute;
  inset:0;
  border-top:calc(var(--stroke) * .5) solid rgba(0,0,0,.12);
  border-bottom:calc(var(--stroke) * .5) solid rgba(0,0,0,.12);
  box-sizing:border-box;
  pointer-events:none;
}

#reset.progress::before{
  width:auto;
}

#reset.sample-progress{
  --record-duration:2s;
}

#reset.music-progress{
  --record-duration:30s;
}

.button-label{
  position:relative;
  z-index:1;
  display:block;
  width:100%;
  height:100%;
  line-height:1;
  overflow:hidden;
}

#reset.progress .button-label{
  color:#000;
}

.button-label .screen-label{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translateY(0.04em);
}

.button-label .screen-label.incoming{
  animation:screenRollIn .18s ease-out both;
}

.button-label .screen-label.outgoing{
  animation:screenRollOut .18s ease-in both;
}

.button-label .screen-label.incoming-down{
  animation:screenRollInDown .18s ease-out both;
}

.button-label .screen-label.outgoing-down{
  animation:screenRollOutDown .18s ease-in both;
}

@keyframes screenRollIn{
  from{transform:translateY(105%);}
  to{transform:translateY(0.04em);}
}

@keyframes screenRollOut{
  from{transform:translateY(0.04em);}
  to{transform:translateY(-105%);}
}

@keyframes screenRollInDown{
  from{transform:translateY(-105%);}
  to{transform:translateY(0.04em);}
}

@keyframes screenRollOutDown{
  from{transform:translateY(0.04em);}
  to{transform:translateY(105%);}
}

.mode{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:0.78cqw;
  font-size:calc(var(--mode-font-size) * var(--dpr-type-scale));
  line-height:1.2;
  text-align:right;
  white-space:nowrap;
}

.toggle{
  --toggle-gap:0.26cqw;
  --toggle-travel:calc(var(--button-height) - var(--toggle-width));
  width:var(--toggle-width);
  height:var(--button-height);
  border:var(--stroke) solid #000;
  box-sizing:border-box;
  cursor:pointer;
  position:relative;
}

.toggle::before{
  content:"";
  position:absolute;
  left:var(--toggle-gap);
  top:var(--toggle-gap);
  width:calc(100% - (var(--toggle-gap) * 2));
  aspect-ratio:1;
  background:#000;
  transform:translateY(var(--toggle-travel));
  transition:transform .18s ease;
}

.toggle.on::before{
  transform:translateY(0);
}

.dash-right-bottom{
  height:var(--button-height);
  display:flex;
  align-items:center;
  justify-content:flex-end;
  width:max-content;
  position:absolute;
  right:calc(var(--dashboard-padding-x) * 1.333);
  bottom:var(--dashboard-padding-y);
}

.knob{
  --knob-light-size:1.05cqw;
  --knob-light-gap:calc((var(--button-height) - (var(--knob-light-size) * 4)) / 3);
  --knob-extra-offset:0.95cqw;
  height:var(--button-height);
  display:flex;
  align-items:center;
  gap:0.78cqw;
  position:relative;
  overflow:visible;
  flex-shrink:0;
}

.knob-left{
  height:var(--button-height);
  display:grid;
  grid-template-rows:repeat(4, var(--knob-light-size));
  align-content:space-between;
  flex-shrink:0;
}

.knob-light{
  width:var(--knob-light-size);
  height:var(--knob-light-size);
  border:var(--stroke) solid transparent;
  box-sizing:border-box;
  background:#bbb;
}

.knob-light.active,
.knob-light.filled{
  border-color:#000;
  background:#000;
}

.knob-right{
  width:var(--button-height);
  height:var(--button-height);
  border:var(--stroke) solid #000;
  border-radius:50%;
  box-sizing:border-box;
  position:relative;
  flex-shrink:0;
  cursor:pointer;
}

.knob-pointer{
  position:absolute;
  left:50%;
  top:50%;
  width:var(--stroke);
  height:calc(var(--button-height) * .38);
  background:#000;
  transform-origin:50% 100%;
  transform:translate(-50%, -100%) rotate(var(--knob-angle, -135deg));
  transition:transform .18s ease;
}

.knob-pointer.reset-spin{
  animation:knobResetSpin .5s ease-in-out both;
  transition:none;
}

@keyframes knobResetSpin{
  from{transform:translate(-50%, -100%) rotate(var(--knob-reset-start-angle));}
  to{transform:translate(-50%, -100%) rotate(var(--knob-reset-end-angle));}
}

.knob-extra{
  width:var(--knob-light-size);
  height:var(--button-height);
  display:grid;
  grid-template-rows:repeat(4, var(--knob-light-size));
  align-content:space-between;
  margin-left:var(--knob-extra-offset);
  box-sizing:border-box;
  flex-shrink:0;
}

#knob-six{
  grid-row:3;
}

#knob-five{
  grid-row:4;
}

.knob-extra-light{
  width:var(--knob-light-size);
  height:var(--knob-light-size);
  min-width:0;
  border:var(--stroke) solid transparent;
  background:#bbb;
  padding:0;
  box-sizing:border-box;
}

.knob-extra-light.active,
.knob-extra-light.filled{
  border-color:#000;
  background:#000;
}

.keys{
  position:relative;
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:repeat(14, 1fr);
  touch-action:none;
}

.white{
  position:relative;
  grid-row:1;
  width:100%;
  height:100%;
  background:#fff;
  border-right:var(--stroke) solid #000;
  box-sizing:border-box;
}

.white:nth-child(14){
  border-right:0;
}

.black{
  position:absolute;
  top:0;
  width:4%;
  height:55%;
  background:#000;
  z-index:2;
}

.black:nth-child(15){left:5%;}
.black:nth-child(16){left:12.15%;}
.black:nth-child(17){left:26.45%;}
.black:nth-child(18){left:33.6%;}
.black:nth-child(19){left:40.75%;}
.black:nth-child(20){left:55%;}
.black:nth-child(21){left:62.15%;}
.black:nth-child(22){left:76.45%;}
.black:nth-child(23){left:83.6%;}
.black:nth-child(24){left:90.75%;}

.active{
  filter:brightness(.8);
}

.black.active{
  background:#555;
  filter:none;
}
</style>

<script>
let audio, defaultSample=null, sample=null, lastKey=null;
let sampleRootNote=261.63;
let mode="sample";
let music=[], musicRecording=false, musicStart=0;
let musicPlaying=false, musicPlaybackTimers=[];
let busy=false, recordTimer=null, countTimer=null, activeRecorder=null, activeStream=null;
let recordSession=0;
let defaultSampleLoading=null;
let playRequestId=0;
let audioGraph=null;
let activeKnob=0;
let renderedKnob=0;
let knobRenderAngle=-60;
let selectedLoopTrack=0;
let styleValues=[0,0,.5,0,.5,.5];
let loopGap=.15;
let loopCycleTimer=null;
const curveCache=new Map();
let identityCurve=null;
const loopTracks=Array.from({length:4},()=>({notes:[], audio:null, duration:0, styles:[0,0,.5,0,.5]}));
let screenLabelTimers=[];

const baseNote=261.63;
const defaultSampleUrl="../sound/piano/delajiikey.wav";
const masterVolume=.5;
const userSampleGain=1.6;
const keyVolumeCompMin=.7;
const keyVolumeCompMax=1;
const echoVolumeCompStart=.3;
const echoVolumeCompEnd=.15;
const colorVolumeBoost=5;
const colorVolumeCut=.3;
const notePeriod=.1;
const echoGap=.0001;
const noteRangeMin=261.63;
const noteRangeInv=1/(987.77-noteRangeMin);
const randomDepth=.15;
const slideThresholdSq=64;
const recordBtn=document.getElementById("record");
const playBtn=document.getElementById("play");
const playLabel=document.getElementById("play-label");
const resetBtn=document.getElementById("reset");
const resetLabel=document.getElementById("reset-label");
const modeToggle=document.getElementById("mode-toggle");
const reverb=document.getElementById("reverb");
const knobDial=document.getElementById("knob-dial");
const knobPointer=document.getElementById("knob-pointer");
const knobLights=[...document.querySelectorAll("[data-knob-light]")];
const knobFive=document.getElementById("knob-five");
const knobSix=document.getElementById("knob-six");
const keys=document.getElementById("keys");
const blackKeys=[...keys.querySelectorAll(".black")];
let blackKeyHitAreas=null;
let sliderAnimationFrame=null;

reverb.value=0;

const samplerKnobLabels=["ADHD","P.M","A/C","AC/DC","Octave","Reset"];
const loopKnobLabels=["Track1","Track2","Track3","Vocal4","Bounce","Reset"];

function syncDprTypeScale(){
  const dpr=window.devicePixelRatio || 1;
  const scale=dpr>=2.5 ? .852 : 1;

  document.documentElement.style.setProperty("--dpr-type-scale", scale);
  document.documentElement.dataset.dpr=String(Math.round(dpr*100)/100);
}

function activeStyles(){
  return styleValues;
}

function snapshotStyles(){
  return styleValues.slice();
}

function currentKnobLabel(){
  return (mode==="music" ? loopKnobLabels : samplerKnobLabels)[activeKnob];
}

function knobAngle(index){
  return [-60,-82.5,-97.5,-125,-247.5,-262.5][index] || -60;
}

function angleNear(angle, reference){
  let normalized=angle;

  while(normalized-reference>180){
    normalized-=360;
  }

  while(reference-normalized>180){
    normalized+=360;
  }

  return normalized;
}

function currentPointerAngle(){
  const transform=getComputedStyle(knobPointer).transform;

  if(!transform || transform==="none") return knobRenderAngle;

  const values=transform.match(/matrix\(([^)]+)\)/)?.[1].split(",").map(Number);
  if(!values || values.length<4) return knobRenderAngle;

  const angle=Math.atan2(values[1],values[0])*(180/Math.PI);
  return angleNear(angle,knobRenderAngle);
}

function nextKnobRenderAngle(index){
  if(index===renderedKnob) return knobRenderAngle;

  let target=knobAngle(index);

  while(target>knobRenderAngle){
    target-=360;
  }

  knobRenderAngle=target;
  renderedKnob=index;
  return target;
}

function updateKnobUi(){
  knobPointer.style.setProperty("--knob-angle", `${nextKnobRenderAngle(activeKnob)}deg`);
  knobLights.forEach((light,index)=>{
    const hasLoop=mode==="music" && trackHasContent(loopTracks[index]);

    light.classList.toggle("active", index===activeKnob);
    light.classList.toggle("filled", hasLoop);
  });
  knobFive.classList.toggle("active", activeKnob===4);
  knobFive.classList.remove("filled");
  knobSix.classList.toggle("active", activeKnob===5);
}

function rememberLoopTrack(){
  if(mode==="music" && activeKnob>=0 && activeKnob<4){
    selectedLoopTrack=activeKnob;
  }
}

function animateSliderTo(value){
  cancelAnimationFrame(sliderAnimationFrame);

  const from=Number(reverb.value) || 0;
  const to=clamp01(value);
  const start=performance.now();
  const duration=180;

  function step(now){
    const progress=Math.min(1,(now-start)/duration);
    const eased=1-Math.pow(1-progress,3);

    reverb.value=from+((to-from)*eased);
    if(progress<1){
      sliderAnimationFrame=requestAnimationFrame(step);
    }
  }

  sliderAnimationFrame=requestAnimationFrame(step);
}

function syncSliderFromState(animate=true){
  const value=mode==="music" ? loopGap : styleValues[activeKnob];

  if(animate){
    animateSliderTo(value);
  }else{
    cancelAnimationFrame(sliderAnimationFrame);
    reverb.value=value;
  }

  updateKnobUi();
}

function clamp01(value){
  return Math.min(1,Math.max(0,Number(value) || 0));
}

function clampUnit(value){
  return value<=0 ? 0 : value>=1 ? 1 : value;
}

function clampSigned(value){
  return value<=-1 ? -1 : value>=1 ? 1 : value;
}

function setSafeFilterFrequency(filter,value,context){
  filter.frequency.value=Math.min(context.sampleRate*.45,Math.max(20,value));
}

function softClipSample(value){
  return Math.tanh(value);
}

function shapeCurve(amount){
  const samples=128;
  const curve=new Float32Array(samples);
  const drive=1+(amount*0.5);
  const grit=amount*.3;

  for(let i=0;i<samples;i++){
    const x=(i/(samples-1))*2-1;
    const rough=Math.sin(i*12.9898)*grit;
    curve[i]=softClipSample((x+rough)*drive)/softClipSample(drive);
  }

  return curve;
}

function getShapeCurve(amount){
  const key=Math.round(amount*100);

  if(!curveCache.has(key)){
    curveCache.set(key,shapeCurve(key/100));
  }

  return curveCache.get(key);
}

function getIdentityCurve(){
  if(identityCurve) return identityCurve;

  const samples=128;
  identityCurve=new Float32Array(samples);

  for(let i=0;i<samples;i++){
    identityCurve[i]=(i/(samples-1))*2-1;
  }

  return identityCurve;
}

function ctx(){
  if(!audio || audio.state==="closed"){
    setAudioSessionType("playback");
    audio=new AudioContext();
  }
  return audio;
}

function setAudioSessionType(type){
  if(!navigator.audioSession) return;

  try{
    navigator.audioSession.type=type;
  }catch(err){}
}

function stopStream(stream){
  stream?.getTracks().forEach(track=>track.stop());
}

function resetAudioAfterMicrophone(context){
  if(context!==audio) return;

  audio=null;
  audioGraph=null;
  setAudioSessionType("playback");
  context.close?.().catch(()=>{});
}

async function loadDefaultSample(){
  if(defaultSampleLoading) return defaultSampleLoading;
  defaultSampleLoading=(async ()=>{
  try{
    const a=ctx();
    const response=await fetch(defaultSampleUrl);
    const buffer=await response.arrayBuffer();

    defaultSample=await a.decodeAudioData(buffer);
    if(!sample){

      updatePlayableState();
    }
  }catch(err){
    defaultSample=null;
    updatePlayableState();
  }
  })();
  return defaultSampleLoading;
}

function detectRootNote(buffer){
  const data=buffer.getChannelData(0);
  const sampleRate=buffer.sampleRate;
  const minLag=Math.floor(sampleRate/987.77);
  const maxLag=Math.floor(sampleRate/261.63);
  let bestLag=0, bestScore=0;

  for(let lag=minLag;lag<=maxLag;lag++){
    let score=0;
    for(let i=0;i<data.length-lag;i+=4) score+=data[i]*data[i+lag];
    if(score>bestScore){
      bestScore=score;
      bestLag=lag;
    }
  }

  if(!bestLag) return baseNote;
  const midi=Math.round(69+(12*Math.log2((sampleRate/bestLag)/440)));
  return 440*Math.pow(2,((((midi-60)%12)+12)%12+60-69)/12);
}

function normalizeUserSample(buffer){
  const data=buffer.getChannelData(0);
  let peak=0, sum=0;

  for(let i=0;i<data.length;i++){
    const value=data[i];
    peak=Math.max(peak,Math.abs(value));
    sum+=value*value;
  }

  if(!peak) return;

  const targetRms=.22;
  const peakCeiling=.95;
  const maxBoost=8;
  const rms=Math.sqrt(sum/data.length);
  const gain=Math.min(maxBoost,targetRms/rms,peakCeiling/peak);

  if(gain===1) return;

  for(let i=0;i<data.length;i++){
    data[i]*=gain;
  }
}

function trimLeadingSilence(buffer){
  const data=buffer.getChannelData(0);
  const noiseSamples=Math.min(data.length,Math.floor(buffer.sampleRate*.2));
  let noiseSum=0;

  for(let i=0;i<noiseSamples;i++){
    noiseSum+=data[i]*data[i];
  }

  const sampleRms=Math.sqrt(noiseSum/Math.max(1,noiseSamples));
  const noiseFloor=sampleRms;
  const threshold=Math.min(.08,Math.max(.006,noiseFloor*40));
  const padding=Math.floor(buffer.sampleRate*.015);
  let start=0;

  while(start<data.length && Math.abs(data[start])<threshold){
    start++;
  }

  start=Math.max(0,start-padding);

  if(start===0 || start>=data.length) return buffer;

  const trimmed=ctx().createBuffer(1,data.length-start,buffer.sampleRate);
  trimmed.getChannelData(0).set(data.subarray(start));

  return trimmed;
}

function createMasterGraph(a,destination){
  const input=a.createGain();
  const masterDistortion=a.createWaveShaper();
  const compressor=a.createDynamicsCompressor();
  const echoInput=a.createGain();
  const echoLimiter=a.createDynamicsCompressor();

  input.gain.value=.7+(styleValues[5]*.6);
  masterDistortion.curve=getIdentityCurve();
  masterDistortion.oversample="none";
  compressor.threshold.value=-10;
  compressor.knee.value=18;
  compressor.ratio.value=8;
  compressor.attack.value=.003;
  compressor.release.value=.12;
  echoLimiter.threshold.value=-18;
  echoLimiter.knee.value=0;
  echoLimiter.ratio.value=20;
  echoLimiter.attack.value=.001;
  echoLimiter.release.value=.04;

  echoInput.connect(echoLimiter);
  echoLimiter.connect(input);
  input.connect(masterDistortion);
  masterDistortion.connect(compressor);
  compressor.connect(destination);

  return {context:a, input, echoInput, masterDistortion};
}

function masterOutput(){
  const a=ctx();

  if(audioGraph?.context===a) return audioGraph.input;

  audioGraph=createMasterGraph(a,a.destination);
  return audioGraph.input;
}

function updateMasterDirt(amount, graph=null){
  const target=graph || (masterOutput(), audioGraph);

  target.masterDistortion.curve=amount>.001 ? getShapeCurve(amount) : getIdentityCurve();
}

function echoOutput(){
  masterOutput();
  return audioGraph.echoInput;
}

function output(gain, destination){
  gain.connect(destination);
}

function playNote(freq, options={}){
  const shouldRecordMusic=mode==="music" && musicRecording && selectedLoopTrack!==3 && !options.loopPlayback;
  const musicEventTime=performance.now()-musicStart;
  setAudioSessionType(mode==="music" && musicRecording && selectedLoopTrack===3 && options.loopPlayback ? "play-and-record" : "playback");
  const a=ctx();
  const resumePromise=a.state==="running" ? null : a.resume?.();
  const samplePromise=!sample && defaultSampleLoading ? defaultSampleLoading : null;

  if(resumePromise || samplePromise){
    const requestId=++playRequestId;

    Promise.all([resumePromise, samplePromise].filter(Boolean)).then(()=>{
      if(requestId===playRequestId){
        scheduleNote(freq,options,shouldRecordMusic,musicEventTime);
      }
    }).catch(()=>{});
    return;
  }

  scheduleNote(freq,options,shouldRecordMusic,musicEventTime);
}

function scheduleNote(freq, options, shouldRecordMusic, musicEventTime){
  const a=options.context || ctx();
  const graph=options.graph || null;
  const renderSample=options.sampleBuffer ?? sample;
  const styles=options.styleSnapshot || activeStyles();
  const reverbProgress=clampUnit(styles[0]);
  const softness=clampUnit(styles[1]);
  const colorPosition=clampSigned((clampUnit(styles[2])-.5)*2);
  const color=clampSigned(colorPosition*1.3);
  const dirt=clampUnit(styles[3]);
  const pitch=Math.max(-2,Math.min(2,(clampUnit(styles[4] ?? .5)-.5)*4));
  const dirtAmount=dirt*dirt;
  const pitchRate=Math.pow(2,pitch);
  const pitchedFreq=freq*pitchRate;
  const reverbTimeScale=1+((1-reverbProgress)*.5);
  const reverbVolumeScale=.8+(reverbProgress*.2);
  const echoCount=options.noEcho || reverbProgress<=0 ? 0 : Math.round(reverbProgress*10);

  const echoProgress=clampUnit((pitchedFreq-noteRangeMin)*noteRangeInv);
  const keyComp=1+(echoProgress*3*softness);
  const keyVolumeComp=1+(softness*(keyVolumeCompMin+((keyVolumeCompMax-keyVolumeCompMin)*echoProgress)));
  const colorVolumeComp=color<0 ? 1-(color*colorVolumeBoost) : 1-(color*colorVolumeCut);
  const colorKeyVolumeComp=colorPosition<0 ? 1+(-colorPosition*.3*echoProgress) : 1+(colorPosition*.3*(1-echoProgress));
  const volume=masterVolume*reverbVolumeScale*(1-(dirtAmount*.5))*keyComp*keyVolumeComp*colorVolumeComp*colorKeyVolumeComp;
  const echoDecay=.82-(echoProgress*.16);
  const echoStartGap=(notePeriod+echoGap)*(3-(reverbProgress*2));
  const noteOutput=graph ? graph.input : masterOutput();
  updateMasterDirt(dirtAmount,graph);
  const fadeTime=.015+(softness*.14*1.3);
  const tailScale=.65+(softness*1.2*1.3);
  const isUserSample=renderSample && renderSample!==defaultSample;
  const sampleGain=isUserSample ? userSampleGain : 1;
  const rate=renderSample ? pitchedFreq/(isUserSample ? sampleRootNote : baseNote) : 1;
  const sampleDuration=renderSample?.duration || 0;
  const firstDuration=renderSample ? sampleDuration/rate : 0;
  const shouldCutStretchedSample=isUserSample && rate<1 && firstDuration>sampleDuration;
  const colorWet=Math.min(1,Math.abs(color));
  const colorHighpassFrequency=color>0 ? 80+(colorWet*620) : 80;
  const userLowpassFrequency=color<0 ? 8200-(colorWet*7800) : 9000-(colorWet*5600);
  const lowShelfGain=color<0 ? -(colorWet*24) : -(colorWet*26);
  const highShelfGain=color>0 ? colorWet*24 : -(colorWet*30);
  const noteRandomDepth=randomDepth+(dirtAmount*.18);
  function varied(value){
    return value*(1+((Math.random()*2-1)*noteRandomDepth));
  }

  function connectVoice(source, gain, toneProgress){
    if(toneProgress>0){
      const tone=a.createBiquadFilter();

      tone.type="lowpass";
      tone.frequency.value=18000-(toneProgress*16400);
      source.connect(tone);
      tone.connect(gain);
      return;
    }

    source.connect(gain);
  }

  function shapeVoiceEnvelope(param, startTime, volume, duration, fadeInTime){
    const stopTime=startTime+duration;
    const fadeEnd=Math.min(startTime+fadeInTime,stopTime-.001);
    const floor=.0001;

    param.setValueAtTime(floor,startTime);
    param.linearRampToValueAtTime(Math.max(floor,volume*.25),startTime+((fadeEnd-startTime)*.5));
    param.linearRampToValueAtTime(volume,fadeEnd);
    param.setValueAtTime(volume,Math.max(fadeEnd,stopTime-fadeTime));
    param.exponentialRampToValueAtTime(floor,stopTime);
  }

  function playVoice(startTime, voiceVolume, isFirst, voicePeriod=notePeriod, toneProgress=0){
    const gain=a.createGain();
    output(gain,isFirst ? noteOutput : graph ? graph.echoInput : echoOutput());

    if(renderSample){
      const src=a.createBufferSource();
      const sourceOffset=0;
      const rawDuration=firstDuration;
      const baseDuration=isFirst && shouldCutStretchedSample ? sampleDuration : rawDuration;
      const playDuration=baseDuration*tailScale;
      const outputVolume=voiceVolume*sampleGain;

      src.buffer=renderSample;
      src.playbackRate.value=rate;

      const highpass=a.createBiquadFilter();
      const lowpass=a.createBiquadFilter();
      const lowShelf=a.createBiquadFilter();
      const highShelf=a.createBiquadFilter();

      highpass.type="highpass";
      setSafeFilterFrequency(highpass,colorHighpassFrequency,a);
      lowpass.type="lowpass";
      setSafeFilterFrequency(lowpass,userLowpassFrequency,a);
      lowShelf.type="lowshelf";
      lowShelf.frequency.value=220;
      lowShelf.gain.value=lowShelfGain;
      highShelf.type="highshelf";
      highShelf.frequency.value=2600;
      highShelf.gain.value=highShelfGain;

      src.connect(highpass);
      highpass.connect(lowShelf);
      lowShelf.connect(highShelf);
      highShelf.connect(lowpass);
      connectVoice(lowpass,gain,toneProgress);

      shapeVoiceEnvelope(gain.gain,startTime,outputVolume,playDuration,fadeTime);

      src.start(startTime,sourceOffset);
      src.stop(startTime+playDuration);

    }else{
      const osc=a.createOscillator();
      const playDuration=voicePeriod*tailScale;

      osc.type="triangle";
      osc.frequency.value=pitchedFreq;
      connectVoice(osc,gain,toneProgress);

      shapeVoiceEnvelope(gain.gain,startTime,voiceVolume,playDuration,fadeTime);

      osc.start(startTime);
      osc.stop(startTime+playDuration);
    }
  }

  function scheduleSplitEcho(startTime, nextTime, voiceVolume, voicePeriod, toneProgress, chance){
    if(chance<=0 || Math.random()>chance) return;

    const splitTime=startTime+((nextTime-startTime)/2);
    const splitVolume=voiceVolume*.55;
    const splitPeriod=varied(voicePeriod);

    playVoice(splitTime,splitVolume,false,splitPeriod,toneProgress);
    scheduleSplitEcho(splitTime,nextTime,splitVolume,splitPeriod,toneProgress, chance*.1);
  }

  let startTime=options.startTime ?? a.currentTime;
  let echoVolumeScale=.55;
  const toneStep=echoCount>1 ? 1/(echoCount-1) : 0;
  const splitChanceScale=.8*toneStep;

  for(let i=0;i<=echoCount;i++){
    const voicePeriod=i===0 ? notePeriod : varied(echoStartGap);
    const toneProgress=i>0 ? (i-1)*toneStep : 0;
    const echoVolumeComp=i===0 ? 1 : echoVolumeCompStart+((echoVolumeCompEnd-echoVolumeCompStart)*toneProgress);
    const echoVolume=i===0 ? volume : volume*echoVolumeScale*echoVolumeComp*varied(1);
    const nextTime=startTime+varied(echoStartGap);

    playVoice(startTime,echoVolume,i===0,voicePeriod,toneProgress);

    if(i>0){
      scheduleSplitEcho(startTime,nextTime,echoVolume,voicePeriod,toneProgress,(i-1)*splitChanceScale);
      echoVolumeScale*=echoDecay;
    }

    startTime=nextTime;
  }

  if(shouldRecordMusic){
    loopTracks[selectedLoopTrack].notes.push({t:musicEventTime, f:freq});
  }
}

function scheduleLoopAudio(track, options={}){
  if(!track.audio) return;

  const a=options.context || ctx();
  const graph=options.graph || null;
  const styles=options.styleSnapshot || track.styles || activeStyles();
  const reverbProgress=clampUnit(styles[0]);
  const color=clampSigned((clampUnit(styles[2])-.5)*2*1.3);
  const dirt=clampUnit(styles[3]);
  const pitch=Math.max(-2,Math.min(2,(clampUnit(styles[4] ?? .5)-.5)*4));
  const dirtAmount=dirt*dirt;
  const pitchRate=Math.pow(2,pitch);
  const colorWet=Math.min(1,Math.abs(color));
  const colorHighpassFrequency=color>0 ? 80+(colorWet*620) : 80;
  const userLowpassFrequency=color<0 ? 8200-(colorWet*7800) : 9000-(colorWet*5600);
  const lowShelfGain=color<0 ? -(colorWet*24) : -(colorWet*26);
  const highShelfGain=color>0 ? colorWet*24 : -(colorWet*30);
  const source=a.createBufferSource();
  const gain=a.createGain();
  const highpass=a.createBiquadFilter();
  const lowShelf=a.createBiquadFilter();
  const highShelf=a.createBiquadFilter();
  const lowpass=a.createBiquadFilter();
  const destination=graph ? graph.input : masterOutput();
  const startTime=options.startTime ?? a.currentTime;
  const volume=masterVolume*(.85+(reverbProgress*.15))*(1-(dirtAmount*.35));

  updateMasterDirt(dirtAmount,graph);

  source.buffer=track.audio;
  source.playbackRate.value=pitchRate;
  gain.gain.setValueAtTime(volume,startTime);

  highpass.type="highpass";
  setSafeFilterFrequency(highpass,colorHighpassFrequency,a);
  lowShelf.type="lowshelf";
  lowShelf.frequency.value=220;
  lowShelf.gain.value=lowShelfGain;
  highShelf.type="highshelf";
  highShelf.frequency.value=2600;
  highShelf.gain.value=highShelfGain;
  lowpass.type="lowpass";
  setSafeFilterFrequency(lowpass,userLowpassFrequency,a);

  source.connect(highpass);
  highpass.connect(lowShelf);
  lowShelf.connect(highShelf);
  highShelf.connect(lowpass);
  lowpass.connect(gain);

  gain.connect(destination);
  source.start(startTime);
}

function writeString(view,offset,string){
  for(let i=0;i<string.length;i++){
    view.setUint8(offset+i,string.charCodeAt(i));
  }
}

function audioBufferToWav(buffer){
  const channelCount=buffer.numberOfChannels;
  const sampleRate=buffer.sampleRate;
  const frameCount=buffer.length;
  const bytesPerSample=2;
  const blockAlign=channelCount*bytesPerSample;
  const dataSize=frameCount*blockAlign;
  const arrayBuffer=new ArrayBuffer(44+dataSize);
  const view=new DataView(arrayBuffer);
  let offset=0;

  writeString(view,offset,"RIFF"); offset+=4;
  view.setUint32(offset,36+dataSize,true); offset+=4;
  writeString(view,offset,"WAVE"); offset+=4;
  writeString(view,offset,"fmt "); offset+=4;
  view.setUint32(offset,16,true); offset+=4;
  view.setUint16(offset,1,true); offset+=2;
  view.setUint16(offset,channelCount,true); offset+=2;
  view.setUint32(offset,sampleRate,true); offset+=4;
  view.setUint32(offset,sampleRate*blockAlign,true); offset+=4;
  view.setUint16(offset,blockAlign,true); offset+=2;
  view.setUint16(offset,bytesPerSample*8,true); offset+=2;
  writeString(view,offset,"data"); offset+=4;
  view.setUint32(offset,dataSize,true); offset+=4;

  const channels=Array.from({length:channelCount},(_,index)=>buffer.getChannelData(index));

  for(let frame=0;frame<frameCount;frame++){
    for(let channel=0;channel<channelCount;channel++){
      const value=Math.max(-1,Math.min(1,channels[channel][frame]));
      view.setInt16(offset,value<0 ? value*0x8000 : value*0x7fff,true);
      offset+=bytesPerSample;
    }
  }

  return arrayBuffer;
}

function downloadBuffer(buffer,filename){
  const blob=new Blob([audioBufferToWav(buffer)],{type:"audio/wav"});
  const url=URL.createObjectURL(blob);
  const link=document.createElement("a");

  link.href=url;
  link.download=filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

async function bounceLoop(){
  if(busy) return;

  if(!hasLoopTone()){
    showTimedStatus("Empty");
    return;
  }

  try{
    const tracks=loopTracks;
    const hasNotes=tracks.some(track=>track.notes.length);
    const baseLength=loopLength();

    if(!baseLength || tracks.every(track=>!trackHasContent(track))){
      showTimedStatus("Empty");
      return;
    }

    if(hasNotes){
      await loadDefaultSample();
    }

    const OfflineContext=window.OfflineAudioContext || window.webkitOfflineAudioContext;
    if(!OfflineContext){
      showTimedStatus("No Bounce");
      return;
    }

    const sampleRate=audio?.sampleRate || 44100;
    const renderSeconds=(baseLength/1000)+4;
    const offline=new OfflineContext(2,Math.ceil(renderSeconds*sampleRate),sampleRate);
    const graph=createMasterGraph(offline,offline.destination);
    const renderSample=sample || defaultSample;

    tracks.forEach(track=>{
      if(track.audio){
        scheduleLoopAudio(track,{
          context:offline,
          graph,
          startTime:0,
          styleSnapshot:track.styles
        });
      }

      track.notes.forEach(note=>{
        scheduleNote(note.f,{
          context:offline,
          graph,
          sampleBuffer:renderSample,
          startTime:note.t/1000,
          styleSnapshot:track.styles,
          loopPlayback:true
        },false,0);
      });
    });

    const buffer=await offline.startRendering();
    const filename="de-lajii-master-bounce.wav";

    downloadBuffer(buffer,filename);
    showTimedStatus("Master WAV");
  }catch(err){
    console.error("Bounce failed:", err);
    showTimedStatus("Bounce Err");
  }
}

function wait(ms){

function spinPointerToFirst(startIndex){
  const startAngle=currentPointerAngle();
  let targetAngle=knobAngle(0);

  while(targetAngle>=startAngle){
    targetAngle-=360;
  }

  if(startIndex===0){
    targetAngle=startAngle-359.99;
  }

  knobPointer.classList.remove("reset-spin");
  knobPointer.style.setProperty("--knob-reset-start-angle", `${startAngle}deg`);
  knobPointer.style.setProperty("--knob-reset-end-angle", `${targetAngle}deg`);
  void knobPointer.offsetWidth;
  knobPointer.classList.add("reset-spin");
  screenLabelTimers.push(setTimeout(()=>{
    knobRenderAngle=targetAngle;
    renderedKnob=0;
    knobPointer.classList.remove("reset-spin");
    updateKnobUi();
  },520));
}

}

async function preRecordCountdown(session){
  clearScreenLabelTimer();
  delete resetLabel.dataset.temporary;
  for(const label of ["3", "2", "1", "Start"]){
    if(session!==recordSession) return false;
    setResetLabel(label);
    await wait(500);
  }
  return session===recordSession;
}

async function recordSample(){
  if(busy) return;
  const session=++recordSession;
  busy=true;
  recordBtn.textContent="●";
  recordBtn.classList.remove("ready", "music-recording");
  recordBtn.classList.add("recording");

  try{
    if(!window.isSecureContext || !navigator.mediaDevices?.getUserMedia){
      throw new Error("Microphone requires HTTPS");
    }

    setAudioSessionType("play-and-record");
    const a=ctx();
    await a.resume?.();
    const stream=await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:false,
        noiseSuppression:false,
        autoGainControl:false
      }
    });
    activeStream=stream;
    const canRecord=await preRecordCountdown(session);

    if(!canRecord){
      abortSampleRecord(a,stream);
      return;
    }

    const source=a.createMediaStreamSource(stream);
    const recorder=a.createScriptProcessor(4096,1,1);
    const silence=a.createGain();
    const chunks=[];
    let finished=false;

    recorder.onaudioprocess=e=>{
      chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };

    const finish=()=>{
      if(finished) return;
      finished=true;
      source.disconnect();
      recorder.disconnect();
      silence.disconnect();
      stopStream(stream);
      activeRecorder=null;
      activeStream=null;

      try{
        if(session===recordSession){
          const length=chunks.reduce((sum,chunk)=>sum+chunk.length,0);
          if(length){
            const buffer=a.createBuffer(1,length,a.sampleRate);
            const data=buffer.getChannelData(0);
            let offset=0;

            chunks.forEach(chunk=>{
              data.set(chunk,offset);
              offset+=chunk.length;
            });

            sample=trimLeadingSilence(buffer);
            normalizeUserSample(sample);
            sampleRootNote=detectRootNote(sample);
            recordBtn.classList.add("ready");
          }else{
            sample=null;
            sampleRootNote=baseNote;
          }
        }
      }finally{
        recordBtn.textContent="●";
        recordBtn.classList.remove("recording");
        clearRecordTimers();
        clearResetProgress(false);
        busy=false;
        updatePlayableState();
        showTemporaryKnobLabel("down");
        resetAudioAfterMicrophone(a);
      }
    };

    setResetLabel("2");
    resetBtn.classList.add("progress", "sample-progress");

    await new Promise(resolve=>requestAnimationFrame(resolve));

    if(session!==recordSession){
      abortSampleRecord(a,stream);
      return;
    }

    silence.gain.value=0;
    source.connect(recorder);
    recorder.connect(silence);
    silence.connect(a.destination);

    activeRecorder={state:"recording", stop:finish};
    activeStream=stream;

    let remaining=2;
    countTimer=setInterval(()=>{
      remaining-=1;
      setResetLabel(Math.max(remaining, 0));
    },1000);
    recordTimer=setTimeout(finish,2000);
  }catch(err){
    console.error("Sample record failed:", err);
    stopStream(activeStream);
    activeStream=null;
    activeRecorder=null;
    if(audio) resetAudioAfterMicrophone(audio);
    resetRecordingUi("recording");
    setResetLabel(!window.isSecureContext ? "HTTPS" : err?.name==="NotAllowedError" ? "Mic Denied" : "Mic Error");
  }
}

async function recordVocalTrack(){
  if(busy) return;
  stopMusicPlayback();
  const session=++recordSession;
  const track=loopTracks[3];
  busy=true;

  track.notes=[];
  track.audio=null;
  track.duration=0;
  track.styles=snapshotStyles();
  musicRecording=false;
  updatePlayableState();
  recordBtn.classList.remove("ready", "recording");
  recordBtn.classList.add("music-recording");

  try{
    if(!window.isSecureContext || !navigator.mediaDevices?.getUserMedia){
      throw new Error("Microphone requires HTTPS");
    }

    setAudioSessionType("play-and-record");
    const a=ctx();
    await a.resume?.();
    const stream=await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:false,
        noiseSuppression:false,
        autoGainControl:false
      }
    });
    activeStream=stream;

    if(!await preRecordCountdown(session)){
      abortSampleRecord(a,stream);
      recordBtn.classList.remove("music-recording");
      updatePlayableState();
      return;
    }

    const source=a.createMediaStreamSource(stream);
    const recorder=a.createScriptProcessor(4096,1,1);
    const silence=a.createGain();
    const chunks=[];
    let finished=false;

    recorder.onaudioprocess=e=>{
      chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };

    const finish=()=>{
      if(finished) return;
      finished=true;
      source.disconnect();
      recorder.disconnect();
      silence.disconnect();
      stopStream(stream);
      activeRecorder=null;
      activeStream=null;

      try{
        if(session===recordSession){
          const length=chunks.reduce((sum,chunk)=>sum+chunk.length,0);

          if(length){
            const buffer=a.createBuffer(1,length,a.sampleRate);
            const data=buffer.getChannelData(0);
            let offset=0;

            chunks.forEach(chunk=>{
              data.set(chunk,offset);
              offset+=chunk.length;
            });

            track.audio=trimLeadingSilence(buffer);
            normalizeUserSample(track.audio);
            track.duration=track.audio.duration*1000;
          }
        }
      }finally{
        musicRecording=false;
        stopMusicPlayback();
        busy=false;
        clearRecordTimers();
        clearResetProgress(false);
        recordBtn.classList.remove("music-recording");
        updatePlayableState();
        showTemporaryKnobLabel("down");
        resetAudioAfterMicrophone(a);
      }
    };

    musicRecording=true;
    musicStart=performance.now();
    musicPlaying=true;
    updatePlayableState();
    scheduleLoopCycle();
    setResetLabel(30);
    resetBtn.classList.add("progress", "music-progress");

    silence.gain.value=0;
    source.connect(recorder);
    recorder.connect(silence);
    silence.connect(a.destination);

    activeRecorder={state:"recording", stop:finish};
    activeStream=stream;

    let remaining=30;
    countTimer=setInterval(()=>{
      remaining-=1;
      setResetLabel(Math.max(remaining, 0));
    },1000);
    recordTimer=setTimeout(finish,30000);
  }catch(err){
    console.error("Vocal record failed:", err);
    stopStream(activeStream);
    activeStream=null;
    activeRecorder=null;
    if(audio) resetAudioAfterMicrophone(audio);
    resetRecordingUi("music-recording");
    setResetLabel(!window.isSecureContext ? "HTTPS" : err?.name==="NotAllowedError" ? "Mic Denied" : "Mic Error");
  }
}

async function recordMusic(){
  if(busy) return;
  if(selectedLoopTrack===3){
    recordVocalTrack();
    return;
  }

  stopMusicPlayback();
  const session=++recordSession;
  busy=true;
  const track=loopTracks[selectedLoopTrack];

  track.notes=[];
  track.audio=null;
  track.duration=0;
  track.styles=snapshotStyles();
  musicRecording=false;
  updatePlayableState();
  recordBtn.classList.remove("ready", "recording");
  recordBtn.classList.add("music-recording");

  if(!await preRecordCountdown(session)){
    resetRecordingUi("music-recording");
    updatePlayableState();
    return;
  }

  let remaining=30;
  musicRecording=true;
  musicStart=performance.now();
  musicPlaying=true;
  updatePlayableState();
  scheduleLoopCycle();
  setResetLabel(remaining);
  resetBtn.classList.add("progress", "music-progress");

  countTimer=setInterval(()=>{
    remaining-=1;
    setResetLabel(Math.max(remaining, 0));
  },1000);

  recordTimer=setTimeout(stopMusicRecord,30000);
}

function stopMusicRecord(cancelSession=false){
  if(cancelSession) recordSession+=1;
  if(!musicRecording && !busy) return;
  const track=loopTracks[selectedLoopTrack];
  const recorded=Boolean(track.notes.length);

  if(track.notes.length){
    const lastNoteTime=Math.max(...track.notes.map(n=>n.t));
    track.duration=lastNoteTime+(notePeriod*1000)+250;
  }else{
    track.duration=0;
  }

  musicRecording=false;
  stopMusicPlayback();
  busy=false;
  clearRecordTimers();
  clearResetProgress(false);
  recordBtn.classList.remove("music-recording");
  updatePlayableState();
  showTemporaryKnobLabel("down");
}

function stopMusicPlayback(){
  musicPlaybackTimers.forEach(timer=>clearTimeout(timer));
  musicPlaybackTimers=[];
  clearTimeout(loopCycleTimer);
  loopCycleTimer=null;
  musicPlaying=false;
  updatePlayableState();
}

function stopMusicRecordAndPlayback(cancelSession=false){
  stopMusicRecord(cancelSession);
  stopMusicPlayback();
}

function loopLength(){
  const longest=Math.max(0,...loopTracks.map(trackLength));
  return longest+(longest*loopGap);
}

function scheduleLoopCycle(){
  if(!musicPlaying) return;

  const length=loopLength();
  if(!length){
    stopMusicPlayback();
    return;
  }

  loopTracks.forEach(track=>{
    if(!trackHasContent(track)) return;

    if(track.audio){
      scheduleLoopAudio(track,{styleSnapshot:track.styles});
    }

    track.notes.forEach(note=>{
      const timer=setTimeout(()=>{
        playNote(note.f,{styleSnapshot:track.styles, loopPlayback:true});
      },note.t);

      musicPlaybackTimers.push(timer);
    });
  });

  loopCycleTimer=setTimeout(()=>{
    musicPlaybackTimers.forEach(timer=>clearTimeout(timer));
    musicPlaybackTimers=[];
    loopCycleTimer=null;
    if(musicRecording){
      musicPlaying=false;
      updatePlayableState();
      return;
    }

    scheduleLoopCycle();
  },length);
}

function playback(){
  if(busy && mode==="sample") return;
  if(busy && mode==="music" && !musicRecording) return;

  if(mode==="sample" && hasSampleTone()){
    playNote(sample!==defaultSample ? sampleRootNote : baseNote,{noEcho:true, styleSnapshot:[0,0,.5,0,.5,.5]});
  }

  if(mode==="music"){
    if(musicRecording){
      if(activeRecorder?.state==="recording"){
        activeRecorder.stop();
        return;
      }

      stopMusicRecordAndPlayback(true);
      return;
    }

    if(musicPlaying){
      stopMusicPlayback();
      return;
    }

    if(!hasLoopTone()) return;

    musicPlaying=true;
    updatePlayableState();
    scheduleLoopCycle();
  }
}

function reset(){
  const resetStartKnob=activeKnob;

  recordSession+=1;
  stopMusicPlayback();
  stopActiveRecorder();
  clearRecordTimers();
  busy=false;

  if(mode==="sample"){
    sample=defaultSample;
    sampleRootNote=baseNote;
    styleValues=[0,0,.5,0,.5,.5];
    if(audioGraph) audioGraph.input.gain.value=1;
    recordBtn.textContent="●";
  }else{
    loopTracks.forEach(track=>{
      track.notes=[];
      track.audio=null;
      track.duration=0;
    });
    selectedLoopTrack=0;
    musicRecording=false;
  }

  activeKnob=0;
  syncSliderFromState();
  clearResetProgress(false);
  recordBtn.classList.remove("recording", "ready", "music-recording");
  updatePlayableState();
  showResetSequence(resetStartKnob);
}

recordBtn.onclick=()=>{
  if(mode==="sample"){
    recordSample();
    return;
  }

  if(busy){
    if(activeRecorder?.state==="recording"){
      activeRecorder.stop();
      return;
    }

    stopMusicRecordAndPlayback(true);
    return;
  }

  recordMusic();
};
playBtn.onclick=playback;
resetBtn.onclick=()=>{
  if(busy) return;

  if(mode==="music" && activeKnob===4){
    bounceLoop();
    return;
  }

  reset();
};

reverb.oninput=()=>{
  cancelAnimationFrame(sliderAnimationFrame);
  let value=clamp01(reverb.value);

  if(mode==="sample" && activeKnob===4){
    value=Math.round(value*4)/4;
    reverb.value=value;
  }

  if(mode==="music"){
    loopGap=value;
  }else{
    styleValues[activeKnob]=value;
    if(activeKnob===5 && audioGraph){
      audioGraph.input.gain.value=.7+(value*.6);
    }
  }
};

knobDial.onclick=()=>{
  if(busy) return;
  activeKnob=(activeKnob+1)%6;
  rememberLoopTrack();

  if(mode==="music" && activeKnob===4){
    updateKnobUi();
    setResetLabel("Bounce","up",true);
    resetLabel.dataset.temporary="knob";
    return;
  }

  if(activeKnob===5){
    if(mode==="sample"){
      syncSliderFromState();
    }else{
      updateKnobUi();
    }
    showTemporaryKnobLabel("up");
    return;
  }

  syncSliderFromState();
  showTemporaryKnobLabel("up");
};

modeToggle.onclick=()=>{
  if(busy) return;
  stopMusicPlayback();
  mode = mode==="sample" ? "music" : "sample";
  activeKnob=0;
  if(mode==="music"){
    selectedLoopTrack=0;
  }
  modeToggle.classList.toggle("on", mode==="music");
  clearScreenLabelTimer();
  delete resetLabel.dataset.temporary;
  syncSliderFromState();
  showTemporaryKnobLabel("down");
  updatePlayableState();
};

syncDprTypeScale();
syncSliderFromState(false);
updatePlayableState();
loadDefaultSample();
function invalidateKeyGeometry(){
  blackKeyHitAreas=null;
}

function handleViewportResize(){
  syncDprTypeScale();
  invalidateKeyGeometry();
}

window.addEventListener("resize",handleViewportResize);
window.visualViewport?.addEventListener("resize",handleViewportResize);
["contextmenu", "selectstart", "dragstart", "copy"].forEach(type=>{
  document.addEventListener(type,event=>event.preventDefault(),{capture:true});
});

function getBlackKeyHitAreas(){
  const keysRect=keys.getBoundingClientRect();
  const blackCenters=blackKeys.map(key=>{
    const rect=key.getBoundingClientRect();

    return {
      key,
      center:rect.left+(rect.width/2)
    };
  });
  const maxHalfWidth=keysRect.width/28;

  blackKeyHitAreas={
    keysRect,
    maxHalfWidth,
    blackCenters
  };

  return blackKeyHitAreas;
}

function expandedBlackKeyFromPoint(x,y,useWidthLimit=false){
  const {keysRect,maxHalfWidth,blackCenters}=blackKeyHitAreas || getBlackKeyHitAreas();

  if(x<keysRect.left || x>keysRect.right) return null;
  if(y<keysRect.top || y>keysRect.top+(keysRect.height*.55)) return null;

  for(let i=0;i<blackCenters.length;i++){
    const current=blackCenters[i];
    const expandedLeft=i===0 ? keysRect.left : (blackCenters[i-1].center+current.center)/2;
    const expandedRight=i===blackCenters.length-1 ? keysRect.right : (current.center+blackCenters[i+1].center)/2;
    const left=useWidthLimit ? Math.max(expandedLeft,current.center-maxHalfWidth) : expandedLeft;
    const right=useWidthLimit ? Math.min(expandedRight,current.center+maxHalfWidth) : expandedRight;

    if(x>=left && x<right) return current.key;
  }

  return null;
}

function trigger(x,y,useExpandedBlackKeys=false,useWidthLimit=false){
  const key=(useExpandedBlackKeys ? expandedBlackKeyFromPoint(x,y,useWidthLimit) : null) || document.elementFromPoint(x,y);
  if(!key?.dataset.note || key===lastKey) return;

  lastKey?.classList.remove("active");
  key.classList.add("active");
  lastKey=key;

  playNote(+key.dataset.note);
}

let pointerStartX=0, pointerStartY=0, pointerIsSlide=false;

window.addEventListener("pointerdown",e=>{
  pointerStartX=e.clientX;
  pointerStartY=e.clientY;
  pointerIsSlide=false;
  trigger(e.clientX,e.clientY,e.pointerType!=="mouse",true);
});
window.addEventListener("pointermove",e=>{
  if(e.pointerType==="touch"){
    if(!pointerIsSlide){
      const dx=e.clientX-pointerStartX;
      const dy=e.clientY-pointerStartY;
      pointerIsSlide=(dx*dx)+(dy*dy)>slideThresholdSq;
    }
    trigger(e.clientX,e.clientY,true,!pointerIsSlide);
  }else if(e.buttons){
    trigger(e.clientX,e.clientY,true);
  }
});
window.addEventListener("pointerup",()=>{
  lastKey?.classList.remove("active");
  lastKey=null;
  pointerIsSlide=false;
});
</script>
