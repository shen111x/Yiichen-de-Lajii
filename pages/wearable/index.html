<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">

  <title>Yiichen de Lajii</title>

  <link rel="stylesheet" href="../../css/universal.css">


  <style>
    .category_body_main {
      width: 100vw;
      min-height: 200vh;
      box-sizing: border-box;
      padding: calc(var(--header_topbar--height) + var(--gap-unit) * 6) calc(var(--gap-unit) * 3) calc(var(--gap-unit) * 3);

      background: #ffffff;
      
    }

    .category_body_hero {
      width: 100%;
      height: 50vh;

      display: flex;
      flex-direction: column;
      align-items: center;

      gap: calc(var(--gap-unit) * 3);
    }

    .category_body_hero_textWrapper {
      text-align: center;
      max-width: 525px;
      padding: 0.25em 0 0.35em;
    }

    .category_body_hero_textWrapper h1 {
      margin: 0;
    }

    .category_body_hero_textWrapper p {
      margin: 0.6em 0 0;
    }

    .category_body_product_wrapper{
      width:100%;
      display: flex;
      flex-direction: column;
      gap: calc(var(--gap-unit) * 3);
      align-items: center;
    }
    
    .category_body_product_item {
      width:500px;
      height:100px;
      display: flex;
      flex-direction: column;
      gap: calc(var(--gap-unit) * 2);

    }
     .category_body_product_item img{
      width:100%;
    }

    .category_body_product_info h2,
    .category_body_product_info p {
      text-align: center;
    }

  </style>
</head>

<body data-page="wearable">
  <header id="header_container"></header>
  <div class="category_body_main">
    <div class="category_body_hero">
      <div class="category_body_hero_textWrapper">
        <h1>Wearable</h1>
        <p>Wearable is a category of products that can be worn on the body, such as smartwatches, fitness trackers, and augmented reality glasses.</p>
      </div>
    </div>

    <div class="category_body_product_wrapper">
      <div class="category_body_product_item">
        <div class="category_body_product_imageWrapper">
          <img src="../../image/wearable/monogram-flag-tee-roc/1.jpg" alt="Product 1">
        </div>
        <div class="category_body_product_info">
          <h2>Smartwatch</h2>
          <p>A smartwatch is a wearable device that can track your fitness, monitor your health, and provide notifications from your smartphone.</p>
          
        </div>
        <button> add to cart </button>

      </div>

    </div>

  <script src="../../js/universal.js"></script>
</body>
</html>
