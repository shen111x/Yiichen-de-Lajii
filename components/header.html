<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentt</title>

  <style>
    :root {
      --header_topbar--height: clamp(28px, 8vw, 35px);
    }

    /* ====================================================================
       1. 头部容器
       ==================================================================== */

    #header_main::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9;

      width: 100%;
      height: calc(var(--header_topbar--height) + var(--gap-unit) * 6);

      pointer-events: none;
      background: var(--page-white);
    }

    #header_topbar {
      /* // 基本尺寸与间距 */
      position: fixed;
      top: calc(var(--gap-unit) * 3);
      left: 0;
      z-index: 20;

      width: 100%;
      height: var(--header_topbar--height);
      box-sizing: border-box;
      padding: 0 calc(var(--gap-unit) * 3);
      overscroll-behavior: none;
      touch-action: pan-x;

      /* // 弹性布局与对齐 */
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ====================================================================
       2. 头部左侧（Logo 区域）
       ==================================================================== */

    .header_left {
      width: auto;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #logo {
      /* Logo 位于所有面板上方 */
      position: relative;
      z-index: 20;

      display: block;
      width: auto;
      height: 100%;
    }

    /* ====================================================================
       3. 头部右侧（按钮区域）
       ==================================================================== */

    .header_right {
      flex: 1;
      display: flex;
      align-items: center;
      max-width: 200px;

      height: 100%;
      margin: 0;
      margin-left:calc(var(--gap-unit) * 4);
      margin-right:clamp(0px, calc(4vw + 1vw - 16px), calc(var(--gap-unit) * 3));
    }

    .header_right .spacer {
      flex: 1;
    }

    /* ====================================================================
       4. 菜单面板（Z-Index: 11）
       ==================================================================== */

    #header_panel_menu {
      /* // 定位与尺寸 */
      position: fixed;
      top: calc(var(--gap-unit) * 1.5);
      bottom: calc(var(--gap-unit) * 1.5);
      left: calc(var(--gap-unit) * 1.5);
      z-index: 11;

      width: calc(var(--header_topbar--height) * 7.7);
      box-sizing: border-box;

      /* // 样式与动画 */
      overflow: hidden;
      transform: translateX(calc(-100% - var(--gap-unit) * 3));
      transition: transform .28s ease;
    }

    #header_main.menu-open #header_panel_menu {
      /* 菜单打开时的位置 */
      transform: translateX(0);
    }

    /* ====================================================================
       5. 购物车面板（Z-Index: 10）
       ==================================================================== */

    #header_panel_cart {
      /* // 定位与尺寸 */
      position: fixed;
      top: calc(var(--gap-unit) * 1.5);
      bottom: calc(var(--gap-unit) * 1.5);
      left: calc(var(--gap-unit) * 1.5);
      z-index: 10;

      width: calc(var(--header_topbar--height) * 7.7);
      box-sizing: border-box;

      /* // 样式与动画 */
      overflow: hidden;
      transform: translateX(calc(-100% - var(--gap-unit) * 3));
      transition: transform .28s ease;
    }

    #header_main.cart-open #header_panel_cart {
      /* 购物车打开时的位置 */
      transform: translateX(0);
    }

    #header_main.menu-open #header_panel_cart {
      /* 桌面端菜单打开时，购物车收在菜单后方 */
      transform: translateX(0);
    }

    #header_main.menu-open.cart-open #header_panel_cart {
      /* 两个面板同时打开时，购物车自动按菜单宽度并排 */
      transform: translateX(calc(100% + var(--gap-unit) * 1.5));
    }

    /* ====================================================================
       6. 面板壳层与内容区
       ==================================================================== */

    .header_panel_wrapper {
      width: 100%;
      height: 100%;
      box-sizing: border-box;

      overflow: hidden;
      background: var(--page-white);
      border: var(--stroke--width) solid #000;
    }

    .header_panel_menu_content,
    .header_panel_cart_content {
      /* 面板内容容器使用 flex column 布局 */
      display: flex;
      flex-direction: column;

      width: 100%;
      height: calc(100% - var(--header_topbar--height) - var(--gap-unit) * 1.5);
      box-sizing: border-box;
      margin-top: calc(var(--header_topbar--height) + var(--gap-unit) * 1.5);

      background: transparent;
    }

    .header_panel_menu_content {
      padding: 0 calc(var(--gap-unit) * 1.5) calc(var(--gap-unit) * 1.5);
    }

    .panel_inner {
      flex: 1;
      display: flex;
      flex-direction: column;

      min-height: 0;
      overflow-y: auto;
    }

    /* ====================================================================
       7. 菜单链接
       ==================================================================== */

    .panel_menu_group {
      display: flex;
      flex-direction: column;
    }

    .panel_menu_group_primary,
    .panel_menu_group_secondary {
      gap: 0.25em;
      margin-top: clamp(0.9em, 3.5vh, 1.5em);
    }

    .panel_menu_item {
      display: inline-block;

      font-size: var(--base--font--size);
      line-height: 1.3;
      color: #000;
      text-decoration: none;
    }

    .panel_menu_item_active {
      text-decoration: underline;
      text-decoration-thickness: var(--stroke--width);
      text-underline-offset: 0.2em;
    }

    /* ====================================================================
       8. 菜单底部 checkout
       ==================================================================== */

    .panel_menu_checkout {
      flex: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5em;

      padding-top: 0;
    }

    .panel_menu_checkout_total {
      font-size: calc(var(--base--font--size) * 0.8);
      text-align: center;
    }

    .panel_menu_checkout_button {
      width: 100%;
      height: 2.5em;
      margin: 0;

      font-size: var(--base--font--size);
      color: #000;

      background: transparent;
      border: var(--stroke--width) solid #000;
      cursor: pointer;
    }

    /* ====================================================================
       移动端样式（当视口宽度小于 --mobile_view_threshold 时生效）
       ==================================================================== */

    @media (max-width: 767px) {
      .header_panel_wrapper {
        max-height: 600px;
      }

      #header_main.menu-open #header_panel_cart {
        transform: translateX(calc(-100% - var(--gap-unit) * 3));
      }

      #header_main.menu-open.cart-open #header_panel_cart {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <div id="header_main">
    <div id="header_topbar">
      <div id="header_left" class="header_left">
        <img id="logo" src="image/brand/logoa_black.png" alt="header_logo">
      </div>

      <div class="header_right">
        <div class="spacer"></div>

        <button class="button_small" id="cart_button" type="button" aria-controls="header_panel_cart" aria-expanded="false">
          Cart
        </button>

        <div class="spacer"></div>

        <button class="button_small" id="menu_button" type="button" aria-controls="header_panel_menu" aria-expanded="false">
          Menu
        </button>
      </div>
    </div>

    <!-- 菜单面板（默认隐藏） -->
    <div id="header_panel_menu" aria-hidden="true">
      <div class="header_panel_wrapper">
        <div class="header_panel_menu_content">
          <div class="panel_inner">
            <div class="panel_menu_group panel_menu_group_primary">
              <a href="#" class="panel_menu_item" data-page="home">Home</a>
              <a href="#" class="panel_menu_item" data-page="wearable">Wearable</a>
              <a href="#" class="panel_menu_item" data-page="bags">Bags</a>
              <a href="#" class="panel_menu_item" data-page="self-defense-weapon">Self-Defense Weapon</a>
              <a href="#" class="panel_menu_item" data-page="life-style">Life Style</a>
              <a href="#" class="panel_menu_item" data-page="arts">“Arts”</a>
            </div>

            <div class="panel_menu_group panel_menu_group_secondary">
              <a href="#" class="panel_menu_item" data-page="tracking">Tracking</a>
              <a href="#" class="panel_menu_item" data-page="guest-service">Guest Service</a>
              <a href="#" class="panel_menu_item" data-page="about">About</a>
            </div>
          </div>

          <div class="panel_menu_checkout">
            <div class="panel_menu_checkout_total">Cart Total: 451.00 usd</div>
            <button class="panel_menu_checkout_button" type="button">Check Out</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 购物车面板（默认隐藏） -->
    <div id="header_panel_cart" aria-hidden="true">
      <div class="header_panel_wrapper">
        <div class="header_panel_cart_content"></div>
      </div>
    </div>
  </div>
</body>
</html>
