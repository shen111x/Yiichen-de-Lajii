<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@font-face{
  font-family:"ImperialScript";
  src:url("../css/f/ImperialScript-Regular.ttf") format("truetype");
  font-weight:400;
  font-style:normal;
}

:root{
  --base--font--size:clamp(1rem, 5vh, 1.1rem);
  --stroke-ratio:0.17;
  --piano-aspect-width:217;
  --piano-aspect-height:101;
  --dashboard-ratio:39fr;
  --keyboard-ratio:65fr;
  --stroke:calc(var(--base--font--size) * var(--stroke-ratio));
  --bottom-stroke-compensation:0.22;
  --dpr-type-scale:1;
  --button-width:13cqw;
  --reset-width:17.56cqw;
  --button-height:6.81cqw;
  --button-gap:1.95cqw;
  --dashboard-padding-x:1.56cqw;
  --dashboard-padding-y:1.56cqw;
  --button-font-size:4cqw;
  --play-font-size:4.93cqw;
  --record-font-size:3.8cqw;
  --mode-font-size:2.93cqw;
  --toggle-width:4.55cqw;
  --slider-thumb-height:calc(var(--button-height) * 0.55);
  --slider-track-width:calc((var(--button-width) * 2) + var(--reset-width) + (var(--button-gap) * 2));
  --slider-thumb-width:var(--button-width);
  --logo-letter-spacing:-0.01em;
  --logo-word-spacing:-0.06em;
  --logo-font-size:7.75cqw;
  --logo-y-offset:-0.2em;
  --record-red:#8b0000;
  --play-green:#0f5f2f;
}

@media (max-width: 767px) {
  :root{
    --stroke-ratio:0.14;
  }
}

html,body,
button,
input,
select,
textarea,
.piano-main{
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}

html,body{
  margin:0;
  width:100%;
  height:auto;
  overflow:hidden;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html,body,
button,
input,
select,
textarea{
  -webkit-text-size-adjust:none;
  text-size-adjust:none;
}

.piano-main{
  container-type:inline-size;
  display:grid;
  position:relative;
  width:100%;
  max-width:100%;
  height:auto;
  aspect-ratio:var(--piano-aspect-width) / var(--piano-aspect-height);
  border:var(--stroke) solid #000;
  box-sizing:border-box;
  grid-template-rows:var(--dashboard-ratio) var(--keyboard-ratio);
  background:#fff;
}

.piano-main::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:calc(var(--stroke) * var(--bottom-stroke-compensation));
  background:#000;
  pointer-events:none;
}

.piano-dashboard{
  border-bottom:var(--stroke) solid #000;
  display:grid;
  grid-template-columns:207fr 10fr;
  min-height:0;
}

.panel-left{
  min-width:0;
  padding:0 var(--dashboard-padding-x);
  box-sizing:border-box;
  display:grid;
  grid-template-rows:minmax(0, 1fr) var(--slider-thumb-height) minmax(0, 1fr) var(--button-height) minmax(0, 1fr);
}

.panel-right{
  display:flex;
  align-items:flex-start;
  justify-content:flex-end;
  padding:var(--dashboard-padding-y) calc(var(--dashboard-padding-x) * 1.333) 0 0;
  box-sizing:border-box;
  position:relative;
  overflow:visible;
}

.logo{
  font-family:"ImperialScript", "Brush Script MT", "Brush Script Std", cursive;
  font-size:calc(var(--logo-font-size) * var(--dpr-type-scale));
  font-weight:400;
  letter-spacing:var(--logo-letter-spacing);
  word-spacing:var(--logo-word-spacing);
  white-space:nowrap;
  transform:translateY(var(--logo-y-offset));
}

.slider-row{
  grid-row:2;
  width:var(--slider-track-width);
  max-width:100%;
  height:var(--slider-thumb-height);
  display:flex;
  align-items:center;
  position:relative;
  overflow:visible;
}

.slider-row::before{
  content:"";
  position:absolute;
  left:0;
  top:50%;
  width:100%;
  height:var(--stroke);
  background:#000;
  transform:translateY(-50%);
}

input[type="range"]{
  position:absolute;
  left:0;
  width:var(--slider-track-width);
  height:var(--slider-thumb-height);
  margin:0;
  appearance:none;
  background:transparent;
}

input[type="range"]::-webkit-slider-runnable-track{
  height:var(--stroke);
  background:transparent;
}

input[type="range"]::-webkit-slider-thumb{
  appearance:none;
  width:var(--slider-thumb-width);
  height:var(--slider-thumb-height);
  margin-top:calc((var(--stroke) - var(--slider-thumb-height)) / 2);
  background:#fff;
  border:var(--stroke) solid #000;
  border-radius:0;
}

input[type="range"]::-moz-range-track{
  height:var(--stroke);
  background:transparent;
}

input[type="range"]::-moz-range-thumb{
  width:var(--slider-thumb-width);
  height:var(--slider-thumb-height);
  background:#fff;
  border:var(--stroke) solid #000;
  border-radius:0;
}

.controls{
  grid-row:4;
  display:flex;
  align-items:center;
  gap:var(--button-gap);
}

button{
  -webkit-appearance:none;
  appearance:none;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
  width:var(--button-width);
  height:var(--button-height);
  padding:0;
  background:#fff;
  border:var(--stroke) solid #000;
  border-radius:0;
  color:#000;
  font-size:calc(var(--button-font-size) * var(--dpr-type-scale));
  line-height:1;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

#record{
  color:var(--record-red);
  font-size:calc(var(--record-font-size) * var(--dpr-type-scale));
}

#play{
  color:#bbb;
  font-size:calc(var(--play-font-size) * var(--dpr-type-scale));
}

#play.ready{
  color:var(--play-green);
}

#play.playing{
  color:#000;
}

#reset{
  width:var(--reset-width);
}

#reset::before{
  content:"";
  position:absolute;
  inset:0;
  width:0%;
  background:#000;
}

#reset.progress::before{
  animation:resetFill var(--record-duration, 1s) linear forwards;
}

#reset.sample-progress{
  --record-duration:2s;
}

#reset.music-progress{
  --record-duration:30s;
}

#reset .button-label{
  position:relative;
  z-index:1;
  display:block;
  line-height:1;
  transform:translateY(0.04em);
}

#reset.progress .button-label{
  color:#fff;
  mix-blend-mode:difference;
}

@keyframes resetFill{
  from{width:0%;}
  to{width:100%;}
}

.mode{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:0.78cqw;
  font-size:calc(var(--mode-font-size) * var(--dpr-type-scale));
  line-height:1.2;
  text-align:right;
  white-space:nowrap;
}

.toggle{
  --toggle-gap:0.26cqw;
  width:var(--toggle-width);
  height:var(--button-height);
  border:var(--stroke) solid #000;
  box-sizing:border-box;
  cursor:pointer;
  position:relative;
}

.toggle::before{
  content:"";
  position:absolute;
  left:var(--toggle-gap);
  bottom:var(--toggle-gap);
  width:calc(100% - (var(--toggle-gap) * 2));
  aspect-ratio:1;
  background:#000;
  transition:top .18s ease, bottom .18s ease;
}

.toggle.on::before{
  top:var(--toggle-gap);
  bottom:auto;
}

.dashrightbottom{
  height:var(--button-height);
  display:flex;
  align-items:center;
  justify-content:flex-end;
  width:max-content;
  position:absolute;
  right:calc(var(--dashboard-padding-x) * 1.333);
  bottom:var(--dashboard-padding-y);
}

.knob{
  height:var(--button-height);
  display:flex;
  align-items:center;
  gap:0.78cqw;
  cursor:pointer;
}

.knob-left{
  height:var(--button-height);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.knob-light{
  width:1.05cqw;
  height:1.05cqw;
  border:0;
  box-sizing:border-box;
  background:#bbb;
}

.knob-light.active,
.knob-light.filled{
  border:var(--stroke) solid #000;
  background:#000;
}

.knob-right{
  width:var(--button-height);
  height:var(--button-height);
  border:var(--stroke) solid #000;
  border-radius:50%;
  box-sizing:border-box;
  position:relative;
}

.knob-pointer{
  position:absolute;
  left:50%;
  top:50%;
  width:var(--stroke);
  height:calc(var(--button-height) * .38);
  background:#000;
  transform-origin:50% 100%;
  transform:translate(-50%, -100%) rotate(var(--knob-angle, -135deg));
}

.keys{
  position:relative;
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:repeat(14, 1fr);
  touch-action:none;
}

.white{
  position:relative;
  grid-row:1;
  width:100%;
  height:100%;
  background:#fff;
  border-right:var(--stroke) solid #000;
  box-sizing:border-box;
}

.white:nth-child(14){
  border-right:0;
}

.black{
  position:absolute;
  top:0;
  width:4%;
  height:55%;
  background:#000;
  z-index:2;
}

.black:nth-child(15){left:5%;}
.black:nth-child(16){left:12.15%;}
.black:nth-child(17){left:26.45%;}
.black:nth-child(18){left:33.6%;}
.black:nth-child(19){left:40.75%;}
.black:nth-child(20){left:55%;}
.black:nth-child(21){left:62.15%;}
.black:nth-child(22){left:76.45%;}
.black:nth-child(23){left:83.6%;}
.black:nth-child(24){left:90.75%;}

.active{
  filter:brightness(.8);
}

.black.active{
  background:#555;
  filter:none;
}

<script>
let audio, defaultSample=null, sample=null, lastKey=null;
let sampleEchoOffset=0, sampleRootNote=261.63;
let mode="sample";
let music=[], musicRecording=false, musicStart=0;
let musicPlaying=false, musicPlaybackTimers=[];
let busy=false, recordTimer=null, countTimer=null, activeRecorder=null, activeStream=null;
let recordSession=0;
let defaultSampleLoading=null;
let playRequestId=0;
let audioGraph=null;
let activeKnob=0;
let styleValues=[0,0,.5,0];
let loopGap=.15;
let loopCycleTimer=null;
const curveCache=new Map();
const loopTracks=Array.from({length:4},()=>({notes:[], duration:0, styles:[0,0,0,0]}));

const baseNote=261.63;
const defaultSampleUrl="../sound/piano/delajiikey.wav";
const masterVolume=.5;
const userSampleGain=1.6;
const keyVolumeCompMin=.7;
const keyVolumeCompMax=1;
const echoVolumeCompStart=.3;
const echoVolumeCompEnd=.15;
const colorVolumeBoost=5;
const colorVolumeCut=.3;
const notePeriod=.1;
const echoGap=.0001;
const noteRangeMin=261.63;
const noteRangeInv=1/(987.77-noteRangeMin);
const randomDepth=.15;
const slideThresholdSq=64;
const echoTransientSkip=.02;
const echoEnergyShift=.05;
const echoZeroCrossSearch=.012;
const echoSpikeRatio=7;
const recordBtn=document.getElementById("record");
const playBtn=document.getElementById("play");
const resetBtn=document.getElementById("reset");
const resetLabel=document.getElementById("resetLabel");
const modeToggle=document.getElementById("modeToggle");
const reverb=document.getElementById("reverb");
const knob=document.getElementById("knob");
const knobPointer=document.getElementById("knobPointer");
const knobLights=[...document.querySelectorAll("[data-knob-light]")];
const keys=document.getElementById("keys");
const blackKeys=[...keys.querySelectorAll(".black")];
let blackKeyHitAreas=null;

reverb.value=0;

function syncDprTypeScale(){
  const dpr=window.devicePixelRatio || 1;
  const scale=dpr>=2.5 ? .852 : 1;

  document.documentElement.style.setProperty("--dpr-type-scale", scale);
  document.documentElement.dataset.dpr=String(Math.round(dpr*100)/100);
}

function activeStyles(){
  return styleValues;
}

function snapshotStyles(){
  return styleValues.slice();
}

function knobAngle(index){
  return [-45,-75,-105,-135][index] || -45;
}

function updateKnobUi(){
  knobPointer.style.setProperty("--knob-angle", `${knobAngle(activeKnob)}deg`);
  knobLights.forEach((light,index)=>{
    const hasLoop=mode==="music" && Boolean(loopTracks[index].notes.length);

    light.classList.toggle("active", index===activeKnob);
    light.classList.toggle("filled", hasLoop);
  });
}

function syncSliderFromState(){
  reverb.value=mode==="music" ? loopGap : styleValues[activeKnob];
  updateKnobUi();
}

function clamp01(value){
  return Math.min(1,Math.max(0,Number(value) || 0));
}

function clampUnit(value){
  return value<=0 ? 0 : value>=1 ? 1 : value;
}

function clampSigned(value){
  return value<=-1 ? -1 : value>=1 ? 1 : value;
}

function softClipSample(value){
  return Math.tanh(value);
}

function shapeCurve(amount){
  const samples=128;
  const curve=new Float32Array(samples);
  const drive=1+(amount*1);
  const grit=amount*.5;

  for(let i=0;i<samples;i++){
    const x=(i/(samples-1))*2-1;
    const rough=Math.sin(i*12.9898)*grit;
    curve[i]=softClipSample((x+rough)*drive)/softClipSample(drive);
  }

  return curve;
}

function getShapeCurve(amount){
  const key=Math.round(amount*100);

  if(!curveCache.has(key)){
    curveCache.set(key,shapeCurve(key/100));
  }

  return curveCache.get(key);
}

function ctx(){
  if(!audio || audio.state==="closed"){
    setAudioSessionType("playback");
    audio=new AudioContext();
  }
  return audio;
}

function setAudioSessionType(type){
  if(!navigator.audioSession) return;

  try{
    navigator.audioSession.type=type;
  }catch(err){}
}

function stopStream(stream){
  stream?.getTracks().forEach(track=>track.stop());
}

function resetAudioAfterMicrophone(context){
  if(context!==audio) return;

  audio=null;
  audioGraph=null;
  setAudioSessionType("playback");
  context.close?.().catch(()=>{});
}

async function loadDefaultSample(){
  if(defaultSampleLoading) return defaultSampleLoading;
  defaultSampleLoading=(async ()=>{
  try{
    const a=ctx();
    const response=await fetch(defaultSampleUrl);
    const buffer=await response.arrayBuffer();

    defaultSample=await a.decodeAudioData(buffer);
    if(!sample){
      sample=defaultSample;
      sampleEchoOffset=0;
      recordBtn.classList.add("ready");
      updatePlayableState();
    }
  }catch(err){
    defaultSample=null;
    updatePlayableState();
  }
  })();
  return defaultSampleLoading;
}

function findNearbyZeroCrossing(data, index, radius){
  const start=Math.max(0,index-radius);
  const end=Math.min(data.length-1,index+radius);
  let bestIndex=index;
  let bestScore=Infinity;

  for(let i=start;i<=end;i++){
    const value=Math.abs(data[i]);
    const crossed=i>0 && ((data[i-1]<=0 && data[i]>=0) || (data[i-1]>=0 && data[i]<=0));
    const score=value+(Math.abs(i-index)/(radius || 1))*.002+(crossed ? 0 : .002);

    if(score<bestScore){
      bestScore=score;
      bestIndex=i;
    }
  }

  return bestIndex;
}

function findEchoUnitOffset(buffer){
  const data=buffer.getChannelData(0);
  const sampleRate=buffer.sampleRate;
  const unitSize=Math.max(1,Math.floor(notePeriod*sampleRate));
  const hop=Math.max(1,Math.floor(unitSize/4));
  const minIndex=Math.min(data.length-1,Math.floor(echoTransientSkip*sampleRate));
  const shift=Math.floor(echoEnergyShift*sampleRate);
  const zeroRadius=Math.floor(echoZeroCrossSearch*sampleRate);
  let bestIndex=0;
  let bestEnergy=0;

  for(let i=minIndex;i<=data.length-unitSize;i+=hop){
    let energy=0;
    let peak=0;

    for(let j=0;j<unitSize;j++){
      const value=Math.abs(data[i+j]);
      energy+=value*value;
      peak=Math.max(peak,value);
    }

    const rms=Math.sqrt(energy/unitSize);
    if(rms && peak>rms*echoSpikeRatio) continue;

    if(energy>bestEnergy){
      bestEnergy=energy;
      bestIndex=i;
    }
  }

  if(!bestEnergy) return 0;

  const shiftedIndex=Math.min(data.length-1,bestIndex+shift);
  return findNearbyZeroCrossing(data,shiftedIndex,zeroRadius)/sampleRate;
}

function detectRootNote(buffer){
  const data=buffer.getChannelData(0);
  const sampleRate=buffer.sampleRate;
  const minLag=Math.floor(sampleRate/987.77);
  const maxLag=Math.floor(sampleRate/261.63);
  let bestLag=0, bestScore=0;

  for(let lag=minLag;lag<=maxLag;lag++){
    let score=0;
    for(let i=0;i<data.length-lag;i+=4) score+=data[i]*data[i+lag];
    if(score>bestScore){
      bestScore=score;
      bestLag=lag;
    }
  }

  if(!bestLag) return baseNote;
  const midi=Math.round(69+(12*Math.log2((sampleRate/bestLag)/440)));
  return 440*Math.pow(2,((((midi-60)%12)+12)%12+60-69)/12);
}

function normalizeUserSample(buffer){
  const data=buffer.getChannelData(0);
  let peak=0, sum=0;

  for(let i=0;i<data.length;i++){
    const value=data[i];
    peak=Math.max(peak,Math.abs(value));
    sum+=value*value;
  }

  if(!peak) return;

  const targetRms=.22;
  const peakCeiling=.95;
  const maxBoost=8;
  const rms=Math.sqrt(sum/data.length);
  const gain=Math.min(maxBoost,targetRms/rms,peakCeiling/peak);

  if(gain===1) return;

  for(let i=0;i<data.length;i++){
    data[i]*=gain;
  }
}

function trimLeadingSilence(buffer){
  const data=buffer.getChannelData(0);
  const threshold=.015;
  const padding=Math.floor(buffer.sampleRate*.015);
  let start=0;

  while(start<data.length && Math.abs(data[start])<threshold){
    start++;
  }

  start=Math.max(0,start-padding);

  if(start===0 || start>=data.length) return buffer;

  const trimmed=ctx().createBuffer(1,data.length-start,buffer.sampleRate);
  trimmed.getChannelData(0).set(data.subarray(start));

  return trimmed;
}

function masterOutput(){
  const a=ctx();

  if(audioGraph?.context===a) return audioGraph.input;

  const input=a.createGain();
  const compressor=a.createDynamicsCompressor();
  const echoInput=a.createGain();
  const echoLimiter=a.createDynamicsCompressor();

  compressor.threshold.value=-10;
  compressor.knee.value=18;
  compressor.ratio.value=8;
  compressor.attack.value=.003;
  compressor.release.value=.12;
  echoLimiter.threshold.value=-18;
  echoLimiter.knee.value=0;
  echoLimiter.ratio.value=20;
  echoLimiter.attack.value=.001;
  echoLimiter.release.value=.04;

  echoInput.connect(echoLimiter);
  echoLimiter.connect(input);
  input.connect(compressor);
  compressor.connect(a.destination);
  audioGraph={context:a, input, echoInput};

  return input;
}

function echoOutput(){
  masterOutput();
  return audioGraph.echoInput;
}

function output(gain, destination){
  gain.connect(destination);
}

function playNote(freq, options={}){
  const shouldRecordMusic=mode==="music" && musicRecording && !options.loopPlayback;
  const musicEventTime=performance.now()-musicStart;
  setAudioSessionType("playback");
  const a=ctx();
  const resumePromise=a.state==="running" ? null : a.resume?.();
  const samplePromise=!sample && defaultSampleLoading ? defaultSampleLoading : null;

  if(resumePromise || samplePromise){
    const requestId=++playRequestId;

    Promise.all([resumePromise, samplePromise].filter(Boolean)).then(()=>{
      if(requestId===playRequestId){
        scheduleNote(freq,options,shouldRecordMusic,musicEventTime);
      }
    }).catch(()=>{});
    return;
  }

  scheduleNote(freq,options,shouldRecordMusic,musicEventTime);
}

function scheduleNote(freq, options, shouldRecordMusic, musicEventTime){
  const a=ctx();
  const styles=options.styleSnapshot || activeStyles();
  const reverbProgress=clampUnit(styles[0]);
  const softness=clampUnit(styles[1]);
  const color=clampSigned((clampUnit(styles[2])-.5)*2*1.3);
  const dirt=clampUnit(styles[3]);
  const dirtAmount=dirt*dirt;
  const reverbTimeScale=1+((1-reverbProgress)*.5);
  const reverbVolumeScale=.8+(reverbProgress*.2);
  const echoCount=options.noEcho || reverbProgress<=0 ? 0 : Math.round(reverbProgress*(10-(dirtAmount*5)));

  const echoProgress=clampUnit((freq-noteRangeMin)*noteRangeInv);
  const keyComp=1+(echoProgress*3*softness);
  const keyVolumeComp=1+(softness*(keyVolumeCompMin+((keyVolumeCompMax-keyVolumeCompMin)*echoProgress)));
  const colorVolumeComp=color<0 ? 1-(color*colorVolumeBoost) : 1-(color*colorVolumeCut);
  const volume=masterVolume*reverbVolumeScale*(1-(dirtAmount*.5))*keyComp*keyVolumeComp*colorVolumeComp;
  const echoDecay=.82-(echoProgress*.16);
  const scaledNotePeriod=notePeriod*reverbTimeScale;
  const scaledEchoGap=echoGap*reverbTimeScale;
  const distortionCurve=dirtAmount>.001 ? getShapeCurve(dirtAmount) : null;
  const noteOutput=masterOutput();
  const fadeTime=.015+(softness*.14*1.3);
  const tailScale=.65+(softness*1.2*1.3);
  const isUserSample=sample && sample!==defaultSample;
  const sampleGain=isUserSample ? userSampleGain : 1;
  const rate=sample ? freq/(isUserSample ? sampleRootNote : baseNote) : 1;
  const sampleDuration=sample?.duration || 0;
  const firstDuration=sample ? sampleDuration/rate : 0;
  const echoSourceOffset=sampleEchoOffset;
  const echoAvailableDuration=Math.max(0,sampleDuration-echoSourceOffset);
  const echoDurationLimit=echoAvailableDuration/rate;
  const shouldCutStretchedSample=isUserSample && rate<1 && firstDuration>sampleDuration;
  const colorWet=Math.min(1,Math.abs(color));
  const colorHighpassFrequency=color>0 ? 80+(colorWet*620) : 80;
  const userLowpassFrequency=color<0 ? 8200-(colorWet*7800) : 9000-(colorWet*5600);
  const lowShelfGain=color<0 ? -(colorWet*24) : -(colorWet*26);
  const highShelfGain=color>0 ? colorWet*24 : -(colorWet*30);
  const noteRandomDepth=randomDepth+(dirtAmount*.18);
  function varied(value){
    return value*(1+((Math.random()*2-1)*noteRandomDepth));
  }

  function connectVoice(source, gain, toneProgress){
    if(toneProgress>0){
      const tone=a.createBiquadFilter();

      tone.type="lowpass";
      tone.frequency.value=18000-(toneProgress*16400);
      source.connect(tone);
      tone.connect(gain);
      return;
    }

    source.connect(gain);
  }

  function connectDirt(source, gain, toneProgress){
    if(!distortionCurve){
      connectVoice(source,gain,toneProgress);
      return;
    }

    const distortion=a.createWaveShaper();

    distortion.curve=distortionCurve;
    distortion.oversample="none";
    source.connect(distortion);
    connectVoice(distortion,gain,toneProgress);
  }

  function shapeVoiceEnvelope(param, startTime, volume, duration, fadeInTime){
    const stopTime=startTime+duration;
    const fadeEnd=Math.min(startTime+fadeInTime,stopTime-.001);
    const floor=.0001;

    param.setValueAtTime(floor,startTime);
    param.linearRampToValueAtTime(Math.max(floor,volume*.25),startTime+((fadeEnd-startTime)*.5));
    param.linearRampToValueAtTime(volume,fadeEnd);
    param.setValueAtTime(volume,Math.max(fadeEnd,stopTime-fadeTime));
    param.exponentialRampToValueAtTime(floor,stopTime);
  }

  function playVoice(startTime, voiceVolume, isFirst, voicePeriod=notePeriod, toneProgress=0){
    const gain=a.createGain();
    output(gain,isFirst ? noteOutput : echoOutput());

    if(sample){
      const src=a.createBufferSource();
      const sourceOffset=isFirst ? 0 : echoSourceOffset;
      const rawDuration=isFirst ? firstDuration : Math.min(echoDurationLimit,voicePeriod+.02);
      const baseDuration=isFirst && shouldCutStretchedSample ? sampleDuration : rawDuration;
      const playDuration=baseDuration*tailScale;
      const outputVolume=voiceVolume*sampleGain;

      src.buffer=sample;
      src.playbackRate.value=rate;

      const highpass=a.createBiquadFilter();
      const lowpass=a.createBiquadFilter();
      const lowShelf=a.createBiquadFilter();
      const highShelf=a.createBiquadFilter();

      highpass.type="highpass";
      highpass.frequency.value=colorHighpassFrequency;
      lowpass.type="lowpass";
      lowpass.frequency.value=userLowpassFrequency;
      lowShelf.type="lowshelf";
      lowShelf.frequency.value=220;
      lowShelf.gain.value=lowShelfGain;
      highShelf.type="highshelf";
      highShelf.frequency.value=2600;
      highShelf.gain.value=highShelfGain;

      src.connect(highpass);
      highpass.connect(lowShelf);
      lowShelf.connect(highShelf);
      highShelf.connect(lowpass);
      connectDirt(lowpass,gain,toneProgress);

      shapeVoiceEnvelope(gain.gain,startTime,outputVolume,playDuration,fadeTime);

      src.start(startTime,sourceOffset);
      src.stop(startTime+playDuration);

    }else{
      const osc=a.createOscillator();
      const playDuration=voicePeriod*tailScale;

      osc.type="triangle";
      osc.frequency.value=freq;
      connectVoice(osc,gain,toneProgress);

      shapeVoiceEnvelope(gain.gain,startTime,voiceVolume,playDuration,fadeTime);

      osc.start(startTime);
      osc.stop(startTime+playDuration);
    }
  }

  function scheduleSplitEcho(startTime, nextTime, voiceVolume, voicePeriod, toneProgress, chance){
    if(chance<=0 || Math.random()>chance) return;

    const splitTime=startTime+((nextTime-startTime)/2);
    const splitVolume=voiceVolume*.55;
    const splitPeriod=varied(voicePeriod);

    playVoice(splitTime,splitVolume,false,splitPeriod,toneProgress);
    scheduleSplitEcho(splitTime,nextTime,splitVolume,splitPeriod,toneProgress, chance*.1);
  }

  let startTime=a.currentTime;
  let echoVolumeScale=.55;
  const toneStep=echoCount>1 ? 1/(echoCount-1) : 0;
  const splitChanceScale=.8*(1-dirtAmount)*toneStep;

  for(let i=0;i<=echoCount;i++){
    const voicePeriod=i===0 ? notePeriod : varied(scaledNotePeriod);
    const toneProgress=i>0 ? (i-1)*toneStep : 0;
    const echoVolumeComp=i===0 ? 1 : echoVolumeCompStart+((echoVolumeCompEnd-echoVolumeCompStart)*toneProgress);
    const echoVolume=i===0 ? volume : volume*echoVolumeScale*echoVolumeComp*varied(1);
    const nextTime=startTime+varied(scaledNotePeriod+scaledEchoGap);

    playVoice(startTime,echoVolume,i===0,voicePeriod,toneProgress);

    if(i>0){
      scheduleSplitEcho(startTime,nextTime,echoVolume,voicePeriod,toneProgress,(i-1)*splitChanceScale);
      echoVolumeScale*=echoDecay;
    }

    startTime=nextTime;
  }

  if(shouldRecordMusic){
    loopTracks[activeKnob].notes.push({t:musicEventTime, f:freq});
  }
}

function wait(ms){
  return new Promise(resolve=>setTimeout(resolve, ms));
}

function setResetLabel(text){
  resetLabel.textContent=text;
}

function hasSampleTone(){
  return Boolean(sample || !defaultSample);
}

function hasLoopTone(){
  return loopTracks.some(track=>track.notes.length);
}

function resetRecordingUi(...classes){
  recordBtn.classList.remove(...classes);
  clearResetProgress();
  busy=false;
}

function updatePlayableState(){
  playBtn.classList.toggle("ready", mode==="sample" ? hasSampleTone() : hasLoopTone());
  playBtn.classList.toggle("playing", mode==="music" && musicPlaying);
  playBtn.textContent=mode==="music" && musicPlaying ? "■" : "▶";
  updateKnobUi();
}

function clearRecordTimers(){
  clearTimeout(recordTimer);
  clearInterval(countTimer);
  recordTimer=null;
  countTimer=null;
}

function stopActiveRecorder(){
  if(activeRecorder?.state==="recording") activeRecorder.stop();
  stopStream(activeStream);
  if(audio) resetAudioAfterMicrophone(audio);
  activeRecorder=null;
  activeStream=null;
}

function clearResetProgress(){
  resetBtn.classList.remove("progress", "sample-progress", "music-progress");
  setResetLabel("Reset");
}

function abortSampleRecord(context, stream){
  stopStream(stream);
  resetAudioAfterMicrophone(context);
  activeStream=null;
  resetRecordingUi("recording");
}

async function preRecordCountdown(session){
  for(const label of ["3", "2", "1", "Start"]){
    if(session!==recordSession) return false;
    setResetLabel(label);
    await wait(500);
  }
  return session===recordSession;
}

async function recordSample(){
  if(busy) return;
  const session=++recordSession;
  busy=true;
  recordBtn.textContent="●";
  recordBtn.classList.remove("ready", "music-recording");
  recordBtn.classList.add("recording");

  try{
    if(!window.isSecureContext || !navigator.mediaDevices?.getUserMedia){
      throw new Error("Microphone requires HTTPS");
    }

    setAudioSessionType("play-and-record");
    const a=ctx();
    await a.resume?.();
    const stream=await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:false,
        noiseSuppression:false,
        autoGainControl:false
      }
    });
    activeStream=stream;
    const canRecord=await preRecordCountdown(session);

    if(!canRecord){
      abortSampleRecord(a,stream);
      return;
    }

    const source=a.createMediaStreamSource(stream);
    const recorder=a.createScriptProcessor(4096,1,1);
    const silence=a.createGain();
    const chunks=[];
    let finished=false;

    recorder.onaudioprocess=e=>{
      chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };

    const finish=()=>{
      if(finished) return;
      finished=true;
      source.disconnect();
      recorder.disconnect();
      silence.disconnect();
      stopStream(stream);
      activeRecorder=null;
      activeStream=null;

      try{
        if(session===recordSession){
          const length=chunks.reduce((sum,chunk)=>sum+chunk.length,0);
          if(length){
            const buffer=a.createBuffer(1,length,a.sampleRate);
            const data=buffer.getChannelData(0);
            let offset=0;

            chunks.forEach(chunk=>{
              data.set(chunk,offset);
              offset+=chunk.length;
            });

            sample=trimLeadingSilence(buffer);
            normalizeUserSample(sample);
            sampleEchoOffset=findEchoUnitOffset(sample);
            sampleRootNote=detectRootNote(sample);
            recordBtn.classList.add("ready");
          }else{
            sample=null;
            sampleEchoOffset=0;
            sampleRootNote=baseNote;
          }
        }
      }finally{
        recordBtn.textContent="●";
        recordBtn.classList.remove("recording");
        clearRecordTimers();
        clearResetProgress();
        busy=false;
        updatePlayableState();
        resetAudioAfterMicrophone(a);
      }
    };

    setResetLabel("0");
    resetBtn.classList.add("progress", "sample-progress");

    await new Promise(resolve=>requestAnimationFrame(resolve));

    if(session!==recordSession){
      abortSampleRecord(a,stream);
      return;
    }

    silence.gain.value=0;
    source.connect(recorder);
    recorder.connect(silence);
    silence.connect(a.destination);

    activeRecorder={state:"recording", stop:finish};
    activeStream=stream;

    recordTimer=setTimeout(finish,2000);
  }catch(err){
    console.error("Sample record failed:", err);
    stopStream(activeStream);
    activeStream=null;
    activeRecorder=null;
    if(audio) resetAudioAfterMicrophone(audio);
    resetRecordingUi("recording");
    setResetLabel(!window.isSecureContext ? "HTTPS" : err?.name==="NotAllowedError" ? "Mic Denied" : "Mic Error");
  }
}

async function recordMusic(){
  if(busy) return;
  stopMusicPlayback();
  const session=++recordSession;
  busy=true;
  const track=loopTracks[activeKnob];

  track.notes=[];
  track.duration=0;
  track.styles=snapshotStyles();
  musicRecording=false;
  updatePlayableState();
  recordBtn.classList.remove("ready", "recording");
  recordBtn.classList.add("music-recording");

  if(!await preRecordCountdown(session)){
    resetRecordingUi("music-recording");
    updatePlayableState();
    return;
  }

  let remaining=30;
  musicRecording=true;
  musicStart=performance.now();
  musicPlaying=true;
  updatePlayableState();
  scheduleLoopCycle();
  setResetLabel(remaining);
  resetBtn.classList.add("progress", "music-progress");

  countTimer=setInterval(()=>{
    remaining-=1;
    setResetLabel(Math.max(remaining, 0));
  },1000);

  recordTimer=setTimeout(stopMusicRecord,30000);
}

function stopMusicRecord(cancelSession=false){
  if(cancelSession) recordSession+=1;
  if(!musicRecording && !busy) return;
  const track=loopTracks[activeKnob];

  if(track.notes.length){
    const lastNoteTime=Math.max(...track.notes.map(n=>n.t));
    track.duration=lastNoteTime+(notePeriod*1000)+250;
  }else{
    track.duration=0;
  }

  musicRecording=false;
  busy=false;
  clearRecordTimers();
  clearResetProgress();
  recordBtn.classList.remove("music-recording");
  updatePlayableState();
}

function stopMusicPlayback(){
  musicPlaybackTimers.forEach(timer=>clearTimeout(timer));
  musicPlaybackTimers=[];
  clearTimeout(loopCycleTimer);
  loopCycleTimer=null;
  musicPlaying=false;
  updatePlayableState();
}

function stopMusicRecordAndPlayback(cancelSession=false){
  stopMusicRecord(cancelSession);
  stopMusicPlayback();
}

function loopLength(){
  const longest=Math.max(0,...loopTracks.map(track=>track.duration || 0));
  return longest+(longest*loopGap);
}

function scheduleLoopCycle(){
  if(!musicPlaying) return;

  const length=loopLength();
  if(!length){
    stopMusicPlayback();
    return;
  }

  loopTracks.forEach(track=>{
    if(!track.notes.length) return;

    track.notes.forEach(note=>{
      const timer=setTimeout(()=>{
        playNote(note.f,{styleSnapshot:track.styles, loopPlayback:true});
      },note.t);

      musicPlaybackTimers.push(timer);
    });
  });

  loopCycleTimer=setTimeout(()=>{
    musicPlaybackTimers.forEach(timer=>clearTimeout(timer));
    musicPlaybackTimers=[];
    scheduleLoopCycle();
  },length);
}

function playback(){
  if(mode==="sample" && hasSampleTone()){
    playNote(sample!==defaultSample ? sampleRootNote : baseNote,{noEcho:true});
  }

  if(mode==="music"){
    if(musicRecording){
      stopMusicRecordAndPlayback(true);
      return;
    }

    if(musicPlaying){
      stopMusicPlayback();
      return;
    }

    if(!hasLoopTone()) return;

    musicPlaying=true;
    updatePlayableState();
    scheduleLoopCycle();
  }
}

function reset(){
  recordSession+=1;
  stopMusicPlayback();
  stopActiveRecorder();
  clearRecordTimers();
  busy=false;

  if(mode==="sample"){
    sample=defaultSample;
    sampleEchoOffset=0;
    sampleRootNote=baseNote;
    activeKnob=0;
    styleValues=[0,0,.5,0];
    syncSliderFromState();
    recordBtn.textContent="●";
  }else{
    loopTracks[activeKnob].notes=[];
    loopTracks[activeKnob].duration=0;
    musicRecording=false;
  }

  clearResetProgress();
  recordBtn.classList.remove("recording", "ready", "music-recording");
  updatePlayableState();
}

recordBtn.onclick=()=>{
  if(mode==="sample"){
    recordSample();
    return;
  }

  if(busy){
    stopMusicRecordAndPlayback(true);
    return;
  }

  recordMusic();
};
playBtn.onclick=playback;
resetBtn.onclick=reset;

reverb.oninput=()=>{
  const value=clamp01(reverb.value);

  if(mode==="music"){
    loopGap=value;
  }else{
    styleValues[activeKnob]=value;
  }
};

knob.onclick=()=>{
  if(busy) return;
  activeKnob=(activeKnob+1)%4;
  syncSliderFromState();
};

modeToggle.onclick=()=>{
  stopMusicPlayback();
  mode = mode==="sample" ? "music" : "sample";
  modeToggle.classList.toggle("on", mode==="music");
  syncSliderFromState();
  updatePlayableState();
};

syncDprTypeScale();
syncSliderFromState();
updatePlayableState();
loadDefaultSample();
function invalidateKeyGeometry(){
  blackKeyHitAreas=null;
}

function handleViewportResize(){
  syncDprTypeScale();
  invalidateKeyGeometry();
}

window.addEventListener("resize",handleViewportResize);
window.visualViewport?.addEventListener("resize",handleViewportResize);
["contextmenu", "selectstart", "dragstart", "copy"].forEach(type=>{
  document.addEventListener(type,event=>event.preventDefault(),{capture:true});
});

function getBlackKeyHitAreas(){
  const keysRect=keys.getBoundingClientRect();
  const blackCenters=blackKeys.map(key=>{
    const rect=key.getBoundingClientRect();

    return {
      key,
      center:rect.left+(rect.width/2)
    };
  });
  const maxHalfWidth=keysRect.width/28;

  blackKeyHitAreas={
    keysRect,
    maxHalfWidth,
    blackCenters
  };

  return blackKeyHitAreas;
}

function expandedBlackKeyFromPoint(x,y,useWidthLimit=false){
  const {keysRect,maxHalfWidth,blackCenters}=blackKeyHitAreas || getBlackKeyHitAreas();

  if(x<keysRect.left || x>keysRect.right) return null;
  if(y<keysRect.top || y>keysRect.top+(keysRect.height*.55)) return null;

  for(let i=0;i<blackCenters.length;i++){
    const current=blackCenters[i];
    const expandedLeft=i===0 ? keysRect.left : (blackCenters[i-1].center+current.center)/2;
    const expandedRight=i===blackCenters.length-1 ? keysRect.right : (current.center+blackCenters[i+1].center)/2;
    const left=useWidthLimit ? Math.max(expandedLeft,current.center-maxHalfWidth) : expandedLeft;
    const right=useWidthLimit ? Math.min(expandedRight,current.center+maxHalfWidth) : expandedRight;

    if(x>=left && x<right) return current.key;
  }

  return null;
}

function trigger(x,y,useExpandedBlackKeys=false,useWidthLimit=false){
  const key=(useExpandedBlackKeys ? expandedBlackKeyFromPoint(x,y,useWidthLimit) : null) || document.elementFromPoint(x,y);
  if(!key?.dataset.note || key===lastKey) return;

  lastKey?.classList.remove("active");
  key.classList.add("active");
  lastKey=key;

  playNote(+key.dataset.note);
}

let pointerStartX=0, pointerStartY=0, pointerIsSlide=false;

window.addEventListener("pointerdown",e=>{
  pointerStartX=e.clientX;
  pointerStartY=e.clientY;
  pointerIsSlide=false;
  trigger(e.clientX,e.clientY,e.pointerType!=="mouse",true);
});
window.addEventListener("pointermove",e=>{
  if(e.pointerType==="touch"){
    if(!pointerIsSlide){
      const dx=e.clientX-pointerStartX;
      const dy=e.clientY-pointerStartY;
      pointerIsSlide=(dx*dx)+(dy*dy)>slideThresholdSq;
    }
    trigger(e.clientX,e.clientY,true,!pointerIsSlide);
  }else if(e.buttons){
    trigger(e.clientX,e.clientY,true);
  }
});
window.addEventListener("pointerup",()=>{
  lastKey?.classList.remove("active");
  lastKey=null;
  pointerIsSlide=false;
});
</script>
