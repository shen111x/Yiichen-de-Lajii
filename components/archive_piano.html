<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    display:flex;
    flex-direction:column;
}

.controls{
    height:18px;
    display:flex;
}

button{
    flex:1;
    font-size:8px;
    border:0.03em solid #000;
    background:white;
    padding:0;
}

#record{
    background:linear-gradient(to right, #000 0%, white 0%);
    color:#000;
}

#record.recording{
    animation:fill 1s linear forwards;
}

@keyframes fill{
    from{background:linear-gradient(to right, #000 0%, white 0%);}
    to{background:linear-gradient(to right, #000 100%, white 100%);}
}

.piano{
    position:relative;
    width:100%;
    flex:1;
    user-select:none;
    touch-action:none;
}

.white{
    position:absolute;
    bottom:0;
    width:calc(100% / 14);
    height:100%;
    background:white;
    border:0.03em solid #000;
    box-sizing:border-box;
}

.black{
    position:absolute;
    top:0;
    width:4%;
    height:60%;
    background:black;
    z-index:2;
}

.active{
    filter:brightness(.75);
}
</style>
</head>
<body>

<div class="controls">
    <button id="record">Null</button>
    <button id="reset">Reset</button>
</div>

<div class="piano">
    <div class="white" data-note="261.63" style="left:0%"></div>
    <div class="white" data-note="293.66" style="left:7.1428%"></div>
    <div class="white" data-note="329.63" style="left:14.2856%"></div>
    <div class="white" data-note="349.23" style="left:21.4284%"></div>
    <div class="white" data-note="392.00" style="left:28.5712%"></div>
    <div class="white" data-note="440.00" style="left:35.7140%"></div>
    <div class="white" data-note="493.88" style="left:42.8568%"></div>

    <div class="white" data-note="523.25" style="left:50%"></div>
    <div class="white" data-note="587.33" style="left:57.1428%"></div>
    <div class="white" data-note="659.25" style="left:64.2856%"></div>
    <div class="white" data-note="698.46" style="left:71.4284%"></div>
    <div class="white" data-note="783.99" style="left:78.5712%"></div>
    <div class="white" data-note="880.00" style="left:85.7140%"></div>
    <div class="white" data-note="987.77" style="left:92.8568%"></div>

    <div class="black" data-note="277.18" style="left:5%"></div>
    <div class="black" data-note="311.13" style="left:12.15%"></div>
    <div class="black" data-note="369.99" style="left:26.45%"></div>
    <div class="black" data-note="415.30" style="left:33.60%"></div>
    <div class="black" data-note="466.16" style="left:40.75%"></div>

    <div class="black" data-note="554.37" style="left:55%"></div>
    <div class="black" data-note="622.25" style="left:62.15%"></div>
    <div class="black" data-note="739.99" style="left:76.45%"></div>
    <div class="black" data-note="830.61" style="left:83.60%"></div>
    <div class="black" data-note="932.33" style="left:90.75%"></div>
</div>

<script>
let audio;
let lastKey=null;
let sample=null;
const baseNote=261.63;

const recordBtn=document.getElementById("record");
const resetBtn=document.getElementById("reset");

function ctx(){
    audio ||= new AudioContext();
    return audio;
}

function play(freq){
    const a=ctx();
    const gain=a.createGain();

    gain.connect(a.destination);
    gain.gain.setValueAtTime(.18,a.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,a.currentTime+.45);

    if(sample){
        const src=a.createBufferSource();
        src.buffer=sample;
        src.playbackRate.value=freq/baseNote;
        src.connect(gain);
        src.start();
        src.stop(a.currentTime+.45);
    }else{
        const osc=a.createOscillator();
        osc.type="triangle";
        osc.frequency.value=freq;
        osc.connect(gain);
        osc.start();
        osc.stop(a.currentTime+.35);
    }
}

async function recordSample(){
    const a=ctx();
    recordBtn.textContent="Null";
    recordBtn.classList.remove("recording");
    void recordBtn.offsetWidth;
    recordBtn.classList.add("recording");

    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const rec=new MediaRecorder(stream);
    const chunks=[];

    rec.ondataavailable=e=>chunks.push(e.data);

    rec.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());

        const blob=new Blob(chunks);
        const arr=await blob.arrayBuffer();
        sample=await a.decodeAudioData(arr);

        recordBtn.textContent="Good2Go";
        recordBtn.classList.remove("recording");
        recordBtn.style.background="#000";
        recordBtn.style.color="#fff";
    };

    rec.start();
    setTimeout(()=>rec.stop(),1000);
}

recordBtn.onclick=recordSample;

resetBtn.onclick=()=>{
    sample=null;
    recordBtn.textContent="Null";
    recordBtn.classList.remove("recording");
    recordBtn.style.background="white";
    recordBtn.style.color="#000";
};

function trigger(x,y){
    const key=document.elementFromPoint(x,y);
    if(!key?.dataset.note || key===lastKey) return;

    lastKey?.classList.remove("active");
    key.classList.add("active");
    lastKey=key;

    play(+key.dataset.note);
}

window.addEventListener("pointerdown",e=>trigger(e.clientX,e.clientY));

window.addEventListener("pointermove",e=>{
    if(e.buttons || e.pointerType==="touch") trigger(e.clientX,e.clientY);
});

window.addEventListener("pointerup",()=>{
    lastKey?.classList.remove("active");
    lastKey=null;
});
</script>

</body>
</html>
