<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentt</title>

  <style>
    :root {
      --header-topbar-height: 35px;
    }

    /* ====================================================================
       1. 头部容器
       ==================================================================== */

    #header-topbar {
      /* // 基本尺寸与间距 */
      position: fixed;
      top: calc(var(--gap-unit) * 3);
      left: 0;
      z-index: 20;

      width: 100%;
      height: var(--header-topbar-height);
      box-sizing: border-box;
      padding: 0 calc(var(--gap-unit) * 3);
      overscroll-behavior: none;
      touch-action: pan-x;

      /* // 弹性布局与对齐 */
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ====================================================================
       2. 头部左侧（Logo 区域）
       ==================================================================== */

    .header-left {
      width: auto;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #logo-link {
      /* Logo 位于所有面板上方 */
      position: relative;
      z-index: 20;

      display: block;
      width: auto;
      height: 100%;
      cursor: pointer;
    }

    #logo {
      display: block;
      width: auto;
      height: 100%;
    }

    /* ====================================================================
       3. 头部右侧（按钮区域）
       ==================================================================== */

    .header-right {
      flex: 1;
      display: flex;
      align-items: center;
      max-width: 200px;

      height: 100%;
      margin: 0;
      margin-left:calc(var(--gap-unit) * 4);
      margin-right:clamp(0px, calc(4vw + 1vw - 16px), calc(var(--gap-unit) * 3));
    }

    .header-right .spacer {
      flex: 1;
    }

    #cart-button,
    #menu-button {
      transform: translateY(calc(var(--stroke--width) * -1));
    }

    /* ====================================================================
       4. 菜单面板（Z-Index: 11）
       ==================================================================== */

    #header-panel-menu {
      /* // 定位与尺寸 */
      position: fixed;
      top: calc(var(--gap-unit) * 1.5);
      bottom: calc(var(--gap-unit) * 1.5);
      left: calc(var(--gap-unit) * 1.5);
      z-index: 11;

      width: round(nearest, calc(var(--header-topbar-height) * 7.7), 1px);
      box-sizing: border-box;

      /* // 样式与动画 */
      overflow: hidden;
      transform: translateX(calc(-100% - var(--gap-unit) * 3));
      transition: transform .28s ease;
    }

    #header-main.menu-open #header-panel-menu {
      /* 菜单打开时的位置 */
      transform: translateX(0);
    }

    /* ====================================================================
       5. 购物车面板（Z-Index: 10）
       ==================================================================== */

    #header-panel-cart {
      /* // 定位与尺寸 */
      position: fixed;
      top: calc(var(--gap-unit) * 1.5);
      bottom: calc(var(--gap-unit) * 1.5);
      left: calc(var(--gap-unit) * 1.5);
      z-index: 10;

      width: round(nearest, calc(var(--header-topbar-height) * 7.7), 1px);
      box-sizing: border-box;

      /* // 样式与动画 */
      overflow: hidden;
      transform: translateX(calc(-100% - var(--gap-unit) * 3));
      transition: transform .28s ease;
    }

    #header-main.cart-open #header-panel-cart {
      /* 购物车打开时的位置 */
      transform: translateX(0);
    }

    #header-main.menu-open #header-panel-cart {
      /* 桌面端菜单打开时，购物车收在菜单后方 */
      transform: translateX(0);
    }

    #header-main.menu-open.cart-open #header-panel-cart {
      /* 两个面板同时打开时，购物车自动按菜单宽度并排 */
      transform: translateX(calc(100% + var(--gap-unit) * 1.5));
    }

    /* ====================================================================
       6. 面板壳层与内容区
       ==================================================================== */

    .header-panel-wrapper {
      width: 100%;
      height: 100%;
      box-sizing: border-box;

      overflow: hidden;
      background: #ffffff;
      border: var(--stroke--width) solid #000;
      contain: layout paint;
    }

    .header-panel-menu-content,
    .header-panel-cart-content {
      /* 面板内容容器使用 flex column 布局 */
      display: flex;
      flex-direction: column;

      width: 100%;
      height: calc(100% - var(--header-topbar-height) - var(--gap-unit) * 1.5);
      box-sizing: border-box;
      margin-top: calc(var(--header-topbar-height) + var(--gap-unit) * 1.5);

      background: transparent;
    }

    .header-panel-menu-content,
    .header-panel-cart-content {
      padding: 0 calc(var(--gap-unit) * 1.5) calc(var(--gap-unit) * 1.5);
    }

    .panel-inner {
      flex: 1;
      display: flex;
      flex-direction: column;

      min-height: 0;
      overflow-y: auto;
    }

    /* ====================================================================
       7. 菜单链接
       ==================================================================== */

    .panel-menu-group {
      display: flex;
      flex-direction: column;
    }

    .panel-menu-group-primary,
    .panel-menu-group-secondary {
      gap: 0.25em;
      margin-top: clamp(0.9em, 3.5vh, 1.5em);
    }

    .panel-menu-item {
      display: inline-block;

      font-size: var(--base-font-size);
      line-height: 1.3;
      color: #000;
      text-decoration: none;
    }

    .panel-menu-item-active {
      text-decoration: underline;
      text-decoration-thickness: var(--stroke--width);
      text-underline-offset: 0.2em;
    }

    /* ====================================================================
       8. 面板底部模块
       ==================================================================== */

    .panel-menu-piano {
      flex: none;
      align-self: stretch;
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      aspect-ratio: 217 / 101;
      border: 0;
      background: #ffffff;
      overflow: hidden;
      contain: layout paint;
    }

    .panel-cart-checkout {
      margin-top: auto;
      flex: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5em;

      padding-top: 0;
    }

    .panel-cart-checkout-total {
      font-size: calc(var(--base-font-size) * 0.8);
      text-align: center;
    }

    .panel-cart-checkout-button {
      width: 100%;
      height: var(--header-topbar-height);
      margin: 0;

      font-family: inherit;
      font-size: var(--button-font-size);
      color: #000;

      background: transparent;
      border: var(--stroke--width) solid #000;
      cursor: pointer;
    }

    .panel-cart-header {
      display: none;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      height: calc(var(--header-topbar-height) + var(--gap-unit) * 1.5);
      box-sizing: border-box;
      padding: 0 calc(var(--gap-unit) * 1.5);
    }

    #header-main.menu-open.cart-open .panel-cart-header {
      display: flex;
    }

    #header-main.menu-open.cart-open .header-panel-cart-content {
      margin-top: 0;
    }

    .panel-cart-close,
    .panel-cart-item-delete {
      appearance: none;
      -webkit-appearance: none;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      color: #000;
      font: inherit;
      line-height: 1;
      cursor: pointer;
    }

    .panel-cart-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: calc(var(--gap-unit) * 1.5);
      padding-top: clamp(0.9em, 3.5vh, 1.5em);
    }

    .panel-cart-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 50%;
      align-items: start;
      gap: calc(var(--gap-unit) * 1.2);
      font-size: calc(var(--base-font-size) * 0.8);
      line-height: 1.25;
    }

    .panel-cart-item-info {
      min-width: 0;
    }

    .panel-cart-item-title,
    .panel-cart-item-size {
      overflow-wrap: anywhere;
      line-height: 1.5em;
    }

    .panel-cart-item-title {
      color: #000;
      text-decoration: none;
    }

    .panel-cart-item-title:hover {
      text-decoration: underline;
      text-decoration-thickness: var(--stroke--width);
      text-underline-offset: 0.2em;
    }

    .panel-cart-item-right {
      display: grid;
      grid-template-rows: auto auto;
      gap: calc(var(--gap-unit) * 1.2);
      min-width: 0;
      justify-items: stretch;
    }

    .panel-cart-item-right-top {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: calc(var(--gap-unit) * 1.2);
    }

    .panel-cart-item-right-bottom {
      display: flex;
      justify-content: flex-end;
    }

    .panel-cart-item-qty,
    .panel-cart-item-price {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .panel-cart-item-price {
      text-align: right;
    }

    .panel-cart-item-delete {
      white-space: nowrap;
    
    }

    /* ====================================================================
       移动端样式（当视口宽度小于 --mobile-view-threshold 时生效）
       ==================================================================== */

    @media (max-width: 767px) {
      .header-panel-wrapper {
        height: 100%;
        max-height: 600px;
      }

      .panel-cart-header,
      #header-main.menu-open.cart-open .panel-cart-header {
        display: none;
      }

      #header-main.menu-open.cart-open .header-panel-cart-content {
        margin-top: calc(var(--header-topbar-height) + var(--gap-unit) * 1.5);
      }

      #header-main.menu-open #header-panel-cart {
        transform: translateX(calc(-100% - var(--gap-unit) * 3));
      }

      #header-main.menu-open.cart-open #header-panel-cart {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <div id="header-main">
    <div id="header-topbar">
      <div id="header-left" class="header-left">
        <a id="logo-link" aria-label="Go to homepage">
          <img id="logo" alt="header-logo">
        </a>
      </div>

      <div class="header-right">
        <div class="spacer"></div>

        <button class="button-small" id="cart-button" type="button" aria-controls="header-panel-cart" aria-expanded="false">
          Cart
        </button>

        <div class="spacer"></div>

        <button class="button-small" id="menu-button" type="button" aria-controls="header-panel-menu" aria-expanded="false">
          Menu
        </button>
      </div>
    </div>

    <!-- 菜单面板（默认隐藏） -->
    <div id="header-panel-menu" aria-hidden="true">
      <div class="header-panel-wrapper">
        <div class="header-panel-menu-content">
          <div class="panel-inner">
            <div class="panel-menu-group panel-menu-group-primary" id="header-product-menu">
            </div>

            <div class="panel-menu-group panel-menu-group-secondary">
              <a href="#" class="panel-menu-item" data-menu-path="tracking/">Tracking</a>
              <a href="#" class="panel-menu-item" data-menu-path="guest-service/">Guest Service</a>
              <a href="#" class="panel-menu-item" data-menu-path="about/">About</a>
            </div>
          </div>

          <iframe class="panel-menu-piano" data-component-path="components/de-lajii-sampler.html" title="Piano" allow="microphone *" scrolling="no"></iframe>
        </div>
      </div>
    </div>

    <!-- 购物车面板（默认隐藏） -->
    <div id="header-panel-cart" aria-hidden="true">
      <div class="header-panel-wrapper">
        <div class="panel-cart-header">
          <button class="panel-cart-close" type="button">X</button>
        </div>

        <div class="header-panel-cart-content">
          <div class="panel-cart-list">
            <div id="panel-cart-item-unit" class="panel-cart-item" hidden>
              <div class="panel-cart-item-info">
                <a class="panel-cart-item-title" href="#">Name</a>
                <div class="panel-cart-item-size" hidden>Size: One Size</div>
              </div>
              <div class="panel-cart-item-right">
                <div class="panel-cart-item-right-top">
                  <div class="panel-cart-item-qty">Qty</div>
                  <div class="panel-cart-item-price">Rate</div>
                </div>
                <div class="panel-cart-item-right-bottom">
                  <button class="panel-cart-item-delete" type="button" hidden>Delete</button>
                </div>
              </div>
            </div>
          </div>

          <div class="panel-cart-checkout">
            <div class="panel-cart-checkout-total">Cart Total: 0.00 usd</div>
            <button class="panel-cart-checkout-button" type="button">Check Out</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
