<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">

  <title>Yiichen de Lajii</title>

  <link rel="stylesheet" href="../../css/universal.css">

  <style>
    .category-body-main {
      width: 100vw;
      min-height: 100vh;
      box-sizing: border-box;
      padding: calc(var(--header-topbar-height) + var(--gap-unit) * 3) calc(var(--gap-unit) * 3) calc(var(--gap-unit) * 3);
      background: transparent;
    }

    .category-page {
      width: 100%;
      min-height: 100vh;
    }

    .category-hero {
      width: 100%;
      height: 40vh;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    .category-hero-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: calc(var(--gap-unit) * 1.5);
      text-align: center;
    }

    .category-title {
      margin: 0;
    }

    .category-sort {
      appearance: none;
      -webkit-appearance: none;
      margin: 0;
      padding: calc(var(--gap-unit) * 0.75) calc(var(--gap-unit) * 5) calc(var(--gap-unit) * 0.75) calc(var(--gap-unit) * 2);
      width:115px;
      min-height: calc(var(--header-topbar-height) * 1);
      box-sizing: border-box;
      border: var(--stroke--width) solid #ffffff;
      border-radius: 0;
      background: transparent;
      color: #000;
      font: inherit;
      font-size: var(--product-info-font-size);
      line-height: normal;
      text-align: center;
      text-align-last: center;
      cursor: pointer;
    }

    .category-sort-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .category-sort-wrapper::after {
      content: "";
      position: absolute;
      right: calc(var(--gap-unit) * 2);
      top: 50%;
      width: 0.45em;
      height: 0.45em;
      border-right: var(--stroke--width) solid #000;
      border-bottom: var(--stroke--width) solid #000;
      transform: translateY(-65%) rotate(45deg);
      pointer-events: none;
    }

    .category-products {
      width: min(100%, 920px);
      box-sizing: border-box;
      margin: 0 auto;
      padding: calc(var(--gap-unit) * 3) 0 calc(var(--gap-unit) * 20);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      column-gap: calc(var(--gap-unit) * 4);
      row-gap: calc(var(--gap-unit) * 20);
    }

    .category-product-item {
      min-width: 0;
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: calc(var(--gap-unit) * 2);
    }

    .category-product-image-wrapper {
      width: 100%;
      aspect-ratio: 4 / 5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fff;
    }

    .category-product-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .category-product-image.is-missing {
      display: none;
    }

    .category-product-info {
      min-height: calc(var(--header-topbar-height) * 2.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      font-size: var(--product-info-font-size);
    }

    .category-product-info p {
      margin: 0;
    }

    .category-product-name {
      -webkit-text-stroke: 0.02em #000;
      width:70%;
    }

    .category-product-subtitle {
      opacity: 0.32;
      display:none;
    }

    .category-product-price {
      margin-top: calc(var(--gap-unit) * 2) !important;
      opacity:0.32;
    }

    .category-product-add {
      width: min(132px, 40%);
      height: calc(var(--header-topbar-height) * 1);
      box-sizing: border-box;
      margin-top: calc(var(--gap-unit) * 2);
      border: var(--stroke--width) solid #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--product-info-font-size);
    }

    .category-empty {
      grid-column: 1 / -1;
      min-height: 30vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: var(--product-info-font-size);
    }

    .category-body-copyright-container {
      margin-top: calc(var(--gap-unit) * 8);
    }

    @media (max-width: 767px) {
      .category-body-main {
        padding-left: calc(var(--gap-unit) * 2);
        padding-right: calc(var(--gap-unit) * 2);
      }

      .category-hero {
        min-height: 360px;
      }

      .category-products {
        column-gap: calc(var(--gap-unit) * 2);
        row-gap: calc(var(--gap-unit) * 12);
      }

      .category-sort {
        min-width: 132px;
      }
    }
  </style>
</head>

<body data-page="category">
  <header id="header-container"></header>

  <main class="category-body-main">
    <div class="category-page">
      <section class="category-hero" aria-labelledby="category-title">
        <div class="category-hero-center">
          <h1 id="category-title" class="category-title">Wearable</h1>
          <div class="category-sort-wrapper">
            <select id="category-sort" class="category-sort" aria-label="Sort products">
              <option value="default">Default</option>
              <option value="price-asc">Price ↑</option>
              <option value="price-desc">Price ↓</option>
              <option value="oddness-asc">Oddness ↑</option>
              <option value="oddness-desc">Oddness ↓</option>
            </select>
          </div>
        </div>
      </section>

      <section id="category-products" class="category-products" aria-label="Products">
        <a id="category-product-unit" class="category-product-item" href="../product/index.html?c=01&p=01&product=example-product&item=01" hidden>
          <div class="category-product-image-wrapper">
            <img class="category-product-image" src="../../product-data/c-01/01/img/1.jpg" alt="Product name">
          </div>

          <div class="category-product-info">
            <p class="category-product-name">Product Name</p>
            <p class="category-product-subtitle">Product Subtitle</p>
            <p class="category-product-price">173.43 usd</p>
            <span class="category-product-add">&nbsp Add +</span>
          </div>
        </a>
      </section>
    </div>

    <div id="copyright-container" class="category-body-copyright-container"></div>
  </main>

  <script src="../../js/universal.js"></script>
  <script src="category.js"></script>
</body>
</html>
